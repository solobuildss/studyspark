<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" width="1200" height="380">
  <defs>
    <pattern id="dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="1.2" fill="#1a1530" opacity="0.12"/>
    </pattern>
    <radialGradient id="rad1" cx="20%" cy="10%">
      <stop offset="0%" stop-color="#ff5b8a" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#ff5b8a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rad2" cx="80%" cy="80%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="380" fill="#fff8ec"/>
  <rect width="1200" height="380" fill="url(#dots)"/>
  <rect width="1200" height="380" fill="url(#rad1)"/>
  <rect width="1200" height="380" fill="url(#rad2)"/>

  <!-- Logo dot (matching app) -->
  <circle cx="180" cy="148" r="20" fill="#ffd23f" stroke="#1a1530" stroke-width="3"/>
  <circle cx="170" cy="138" r="16" fill="#ff5b8a" stroke="#1a1530" stroke-width="3"/>

  <!-- Main title -->
  <text x="220" y="170" font-family="Fraunces, Georgia, serif" font-size="88" font-weight="900" fill="#1a1530" letter-spacing="-3">StudySpark</text>

  <!-- Subtitle -->
  <text x="225" y="212" font-family="Outfit, Segoe UI, sans-serif" font-size="21" font-weight="500" fill="#1a1530" opacity="0.7">Your AI study notebooks. Built for exams.</text>

  <!-- Feature pills - Row 1 -->
  <g transform="translate(225, 248)">
    <rect x="0" y="0" width="216" height="36" rx="18" fill="#ff5b8a" stroke="#1a1530" stroke-width="2.5"/>
    <text x="108" y="23" font-family="Outfit, sans-serif" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">📄 PDFs, text, links</text>

    <rect x="228" y="0" width="232" height="36" rx="18" fill="#2dd4bf" stroke="#1a1530" stroke-width="2.5"/>
    <text x="344" y="23" font-family="Outfit, sans-serif" font-size="13" font-weight="700" fill="#1a1530" text-anchor="middle">💬 Chat with citations</text>
  </g>

  <!-- Feature pills - Row 2 -->
  <g transform="translate(225, 294)">
    <rect x="0" y="0" width="192" height="36" rx="18" fill="#ffd23f" stroke="#1a1530" stroke-width="2.5"/>
    <text x="96" y="23" font-family="Outfit, sans-serif" font-size="13" font-weight="700" fill="#1a1530" text-anchor="middle">🎯 Custom quizzes</text>

    <rect x="204" y="0" width="144" height="36" rx="18" fill="#b8e62e" stroke="#1a1530" stroke-width="2.5"/>
    <text x="276" y="23" font-family="Outfit, sans-serif" font-size="13" font-weight="700" fill="#1a1530" text-anchor="middle">🗺️ Mindmaps</text>

    <rect x="360" y="0" width="160" height="36" rx="18" fill="#8b5cf6" stroke="#1a1530" stroke-width="2.5"/>
    <text x="440" y="23" font-family="Outfit, sans-serif" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">☁️ Cloud sync</text>
  </g>

  <!-- Decorative notebook cards on right -->
  <g transform="translate(870, 95)" opacity="0.95">
    <!-- Notebook card 1 -->
    <g transform="translate(0, 0) rotate(-4)">
      <rect x="4" y="4" width="150" height="180" rx="16" fill="#1a1530" opacity="0.15"/>
      <rect x="0" y="0" width="150" height="180" rx="16" fill="#ff5b8a" stroke="#1a1530" stroke-width="3"/>
      <text x="20" y="48" font-size="32">📘</text>
      <text x="20" y="84" font-family="Fraunces, serif" font-size="18" font-weight="800" fill="#fff">ACCA</text>
      <text x="20" y="106" font-family="Fraunces, serif" font-size="18" font-weight="800" fill="#fff">Audit</text>
      <text x="20" y="130" font-family="Outfit, sans-serif" font-size="10" font-weight="600" fill="#fff" opacity="0.85">12 ch · 4 sources</text>

      <rect x="20" y="146" width="42" height="20" rx="10" fill="#fff" stroke="#1a1530" stroke-width="2"/>
      <text x="41" y="160" font-family="Outfit, sans-serif" font-size="10" font-weight="700" fill="#1a1530" text-anchor="middle">📄 PDF</text>
      <rect x="68" y="146" width="44" height="20" rx="10" fill="#fff" stroke="#1a1530" stroke-width="2"/>
      <text x="90" y="160" font-family="Outfit, sans-serif" font-size="10" font-weight="700" fill="#1a1530" text-anchor="middle">📝 Text</text>
    </g>

    <!-- Notebook card 2 -->
    <g transform="translate(150, 22) rotate(3)">
      <rect x="4" y="4" width="150" height="180" rx="16" fill="#1a1530" opacity="0.15"/>
      <rect x="0" y="0" width="150" height="180" rx="16" fill="#2dd4bf" stroke="#1a1530" stroke-width="3"/>
      <text x="20" y="48" font-size="32">🧪</text>
      <text x="20" y="84" font-family="Fraunces, serif" font-size="17" font-weight="800" fill="#1a1530">Chemistry</text>
      <text x="20" y="105" font-family="Fraunces, serif" font-size="17" font-weight="800" fill="#1a1530">Finals</text>
      <text x="20" y="130" font-family="Outfit, sans-serif" font-size="10" font-weight="600" fill="#1a1530" opacity="0.75">8 ch · 3 sources</text>

      <rect x="20" y="146" width="42" height="20" rx="10" fill="#fff" stroke="#1a1530" stroke-width="2"/>
      <text x="41" y="160" font-family="Outfit, sans-serif" font-size="10" font-weight="700" fill="#1a1530" text-anchor="middle">📄 PDF</text>
      <rect x="68" y="146" width="42" height="20" rx="10" fill="#fff" stroke="#1a1530" stroke-width="2"/>
      <text x="89" y="160" font-family="Outfit, sans-serif" font-size="10" font-weight="700" fill="#1a1530" text-anchor="middle">🔗 Link</text>
    </g>
  </g>
</svg>
