  function render(){
    // If embedded config + not signed in -> show sign-in screen
    if(configIsEmbedded() && (state.syncStatus === 'signin-needed' || state.syncStatus === 'unauthorized' || (state.syncStatus === 'error' && !state.googleUser))){
      root.innerHTML = renderSignInScreen() +
        (state.toast ? `<div class="toast">${state.toast}</div>` : '');
      attachHandlers();
      return;
    }
    // If embedded config + still connecting on first load (no user yet) -> brief loader
    if(configIsEmbedded() && state.syncStatus === 'connecting' && !state.googleUser){
      root.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;width:100%;position:relative;z-index:1">
        <div style="text-align:center"><div class="loader-spinner" style="margin:0 auto 16px"></div>
        <div style="font-family:'Fraunces',serif;font-size:18px;font-weight:700">Loading…</div></div>
      </div>` + (state.toast ? `<div class="toast">${state.toast}</div>` : '');
      attachHandlers();
      return;
    }

    let body;
    if(state.loading) body = renderLoader(state.loading.text, state.loading.sub);
    else if(state.currentQuiz && state.quizState && !state.quizState.finished) body = renderQuizPlayer();
    else if(state.quizState && state.quizState.finished) body = renderQuizResults();
    else if(state.currentFlashcards) body = renderFlashcards();
    else if(state.currentMindmap) body = renderMindmap();
    else if(state.page === 'quiz-setup') body = renderQuizSetup();
    else if(state.page === 'notebook' && state.activeNotebook) body = renderNotebook();
    else if(state.page === 'notebooks') body = renderNotebookList();
    else if(state.page === 'results') body = renderResultsPage();
    else body = renderHome();

    root.innerHTML = renderSidebar() + body + renderModal() + renderStudioView() + renderCitePopup() +
      (state.toast ? `<div class="toast">${state.toast}</div>` : '');
    attachHandlers();
  }

  // ===== Handlers =====
  function attachHandlers(){
    document.querySelectorAll('[data-tab]').forEach(el => {
      el.onclick = (e) => {
        e.stopPropagation();
        state.mobileTab = el.dataset.tab;
        render();
      };
    });
    document.querySelectorAll('[data-nav]').forEach(el => {
      el.onclick = (e) => {
        e.stopPropagation();
        state.page = el.dataset.nav;
        state.activeNotebook = null;
        state.currentQuiz = null; state.quizState = null;
        state.currentFlashcards = null; state.flashState = null;
        state.currentMindmap = null; state.studioView = null;
        render();
      };
    });
    document.querySelectorAll('[data-action]').forEach(el => {
      el.onclick = (e) => {
        e.stopPropagation();
        handleAction(el.dataset.action, el.dataset, el, e);
      };
    });
    // emoji pick (modals)
    document.querySelectorAll('[data-emoji]').forEach(el => {
      el.onclick = (e) => {
        e.stopPropagation();
        document.querySelectorAll('[data-emoji]').forEach(x => x.classList.remove('active'));
        el.classList.add('active');
        if(state.modal) state.modal.emoji = el.dataset.emoji;
      };
    });
    // config chips
    document.querySelectorAll('[data-cfg]').forEach(el => {
      el.onclick = () => {
        const v = el.dataset.val;
        state.quizConfig[el.dataset.cfg] = isNaN(v) ? v : parseInt(v);
        render();
      };
    });
    document.querySelectorAll('[data-toggle="type"]').forEach(el => {
      el.onclick = () => {
        const v = el.dataset.val;
        const t = state.quizConfig.types;
        if(t.includes(v)){ if(t.length > 1) state.quizConfig.types = t.filter(x => x !== v); }
        else state.quizConfig.types = [...t, v];
        render();
      };
    });
    // quiz focus textarea
    const qf = $('qs-focus');
    if(qf) qf.oninput = (e) => { state.quizConfig.focus = e.target.value; };
    const qg = $('qs-go');
    if(qg) qg.onclick = () => startQuizGen();
    const shortEl = $('short-ans');
    if(shortEl) shortEl.oninput = (e) => { state.quizState.answers[state.quizState.idx] = e.target.value; };

    // Chat input
    const chatInput = $('chatInput');
    if(chatInput){
      chatInput.onkeydown = (e) => {
        if((e.metaKey || e.ctrlKey) && e.key === 'Enter'){
          e.preventDefault();
          sendMessage();
        }
      };
      // auto-resize
      chatInput.oninput = (e) => {
        e.target.style.height = 'auto';
        e.target.style.height = Math.min(120, e.target.scrollHeight) + 'px';
      };
    }
    // auto-scroll chat to bottom
    const cm = $('chatMsgs');
    if(cm) cm.scrollTop = cm.scrollHeight;
  }

  function handleAction(action, data, el, evt){
    switch(action){
      case 'open-key':
        state.modal = { type: 'apikey' }; render(); break;
      case 'close-modal':
        state.modal = null; render(); break;
      case 'save-key': {
        const v = $('api-key-input').value.trim();
        state.apiKey = v;
        localStorage.setItem('ss_api_key', v);
        state.modal = null;
        toast(v ? '✓ API key saved' : 'Key cleared');
        // Also push to cloud if signed in with Google
        if(fb && fb.user && fb.googleUser){
          saveGeminiKeyToCloud(v).then(() => {
            if(v) toast('☁️ Synced to your other devices too');
          });
        }
        render();
        break;
      }
      case 'sign-in-google':
        signInWithGoogle();
        break;
      case 'sign-out-google':
        if(confirm('Sign out? Your local data stays, but sync will stop.')){
          signOutGoogle();
        }
        break;
      case 'lock-now':
        sessionStorage.removeItem('ss_unlocked');
        location.reload();
        break;
      case 'open-sync':
        state.modal = { type: 'sync-setup' };
        render(); break;
      case 'save-sync': {
        const cfg = {
          projectId: $('sy-pid').value.trim(),
          apiKey: $('sy-ak').value.trim(),
          authDomain: $('sy-ad').value.trim(),
          syncCode: $('sy-sc').value.trim().replace(/[^a-zA-Z0-9_-]/g, '-'),
        };
        if(!cfg.projectId || !cfg.apiKey || !cfg.authDomain || !cfg.syncCode){
          toast('Fill all fields'); return;
        }
        state.modal = null;
        connectFirebase(cfg);
        break;
      }
      case 'disconnect-sync':
        if(confirm('Disconnect from cloud sync? Local data stays. You can reconnect later.')){
          disconnectFirebase();
          state.syncConfig = null;
          localStorage.removeItem('ss_sync_config');
          state.modal = null;
          toast('☁️ Disconnected');
          render();
        }
        break;
      case 'copy-sync-config': {
        const cfg = state.syncConfig;
        const json = JSON.stringify(cfg);
        navigator.clipboard.writeText(json).then(() => {
          toast('📋 Config copied. Paste on your other device');
        }).catch(() => {
          // fallback - show in alert
          prompt('Copy this config and paste on your other device:', json);
        });
        break;
      }
      case 'apply-pasted-config': {
        try {
          const cfg = JSON.parse($('paste-cfg').value.trim());
          if(!cfg.projectId || !cfg.apiKey || !cfg.syncCode) throw new Error('Missing fields');
          state.modal = null;
          connectFirebase(cfg);
        } catch(e){
          toast('❌ Invalid config: ' + e.message);
        }
        break;
      }
      case 'export-data':
        exportData();
        break;
      case 'import-data': {
        const inp = document.createElement('input');
        inp.type = 'file';
        inp.accept = 'application/json';
        inp.onchange = (e) => {
          if(!e.target.files[0]) return;
          const replace = confirm('Replace all current data?\n\nOK = Replace everything\nCancel = Merge (add new, keep existing)');
          importData(e.target.files[0], replace ? 'replace' : 'merge');
        };
        inp.click();
        break;
      }
      case 'new-notebook':
        state.modal = { type: 'new-nb', emoji: NOTEBOOK_EMOJIS[Math.floor(Math.random()*NOTEBOOK_EMOJIS.length)] };
        render(); break;
      case 'create-nb': {
        const t = $('nb-title').value.trim();
        if(!t){ toast('Give it a name'); return; }
        const nb = {
          id: 'nb_' + Date.now(),
          title: t,
          emoji: state.modal.emoji || '📘',
          sources: [],
          created: Date.now(),
          studio: {},
          suggestedQs: [],
        };
        state.notebooks.unshift(nb);
        save();
        state.modal = null;
        state.activeNotebook = nb;
        state.page = 'notebook';
        toast('✨ Notebook created');
        render();
        break;
      }
      case 'open-nb': {
        const nb = state.notebooks.find(n => n.id === data.id);
        if(!nb) return;
        state.activeNotebook = nb;
        state.selectedSources = null;
        state.page = 'notebook';
        render();
        break;
      }
      case 'back-to-nb':
        state.currentQuiz = null; state.quizState = null;
        state.currentFlashcards = null; state.flashState = null;
        state.currentMindmap = null;
        state.page = 'notebook';
        render();
        break;
      case 'rename-nb':
        state.modal = { type: 'rename-nb', emoji: state.activeNotebook.emoji };
        render();
        break;
      case 'save-rename': {
        const t = $('rn-title').value.trim();
        if(!t) return;
        state.activeNotebook.title = t;
        state.activeNotebook.emoji = state.modal.emoji || state.activeNotebook.emoji;
        save();
        state.modal = null;
        toast('✓ Saved');
        render();
        break;
      }
      case 'delete-nb':
        if(confirm(`Delete "${state.activeNotebook.title}" and all its data?`)){
          state.notebooks = state.notebooks.filter(n => n.id !== state.activeNotebook.id);
          delete state.chatHistory[state.activeNotebook.id];
          save();
          state.activeNotebook = null;
          state.page = 'notebooks';
          toast('🗑️ Deleted');
          render();
        }
        break;
      case 'add-pdf': {
        const inp = document.createElement('input');
        inp.type = 'file';
        inp.accept = 'application/pdf';
        inp.onchange = (e) => { if(e.target.files[0]) addPDFSource(e.target.files[0]); };
        inp.click();
        break;
      }
      case 'add-text':
        state.modal = { type: 'add-text' }; render(); break;
      case 'add-link':
        state.modal = { type: 'add-link' }; render(); break;
      case 'save-text': {
        const name = $('txt-name').value.trim() || 'Pasted text';
        const body = $('txt-body').value.trim();
        if(!body || body.length < 50){ toast('Need at least 50 chars'); return; }
        addSource({ type: 'text', name, text: body });
        state.modal = null;
        render();
        break;
      }
      case 'save-link': {
        const url = $('link-url').value.trim();
        if(!url || !url.startsWith('http')){ toast('Enter a valid URL'); return; }
        state.modal = null;
        addLinkSource(url);
        break;
      }
      case 'toggle-src': {
        const id = data.id;
        if(!state.selectedSources) state.selectedSources = new Set(state.activeNotebook.sources.map(s => s.id));
        if(state.selectedSources.has(id)) state.selectedSources.delete(id);
        else state.selectedSources.add(id);
        if(state.selectedSources.size === state.activeNotebook.sources.length) state.selectedSources = null;
        render();
        break;
      }
      case 'del-src':
        if(confirm('Remove this source?')){
          state.activeNotebook.sources = state.activeNotebook.sources.filter(s => s.id !== data.id);
          if(state.selectedSources) state.selectedSources.delete(data.id);
          // Clear studio outputs that depended on it
          state.activeNotebook.studio = {};
          state.activeNotebook.suggestedQs = [];
          save();
          render();
        }
        break;
      case 'select-all-src':
        state.selectedSources = null;
        render();
        break;
      case 'select-none-src':
        state.selectedSources = new Set();
        render();
        break;
      case 'send-msg':
        sendMessage();
        break;
      case 'suggest-q':
        doSuggestQuestions();
        break;
      case 'ask-suggested': {
        const q = data.q;
        sendMessage(q);
        break;
      }
      case 'show-cite': {
        state.citePopup = {
          x: evt.clientX,
          y: evt.clientY,
          sourceNum: parseInt(data.source),
          chunkIdx: parseInt(data.chunk),
        };
        render();
        break;
      }
      case 'close-cite':
        state.citePopup = null; render(); break;
      case 'cite-prev':
        state.citePopup.chunkIdx = Math.max(1, state.citePopup.chunkIdx - 1);
        render(); break;
      case 'cite-next': {
        const src = state.activeNotebook.sources[state.citePopup.sourceNum - 1];
        if(src) state.citePopup.chunkIdx = Math.min(src.chunks.length, state.citePopup.chunkIdx + 1);
        render(); break;
      }
      case 'close-studio':
        state.studioView = null; render(); break;
      case 'studio-summary': doStudio('summary'); break;
      case 'studio-studyguide': doStudio('studyguide'); break;
      case 'studio-faq': doStudio('faq'); break;
      case 'regen-studio':
        doStudio(data.type, true);
        break;
      case 'studio-quiz':
        state.page = 'quiz-setup';
        render();
        break;
      case 'studio-flash': doFlashcards(); break;
      case 'studio-mind': doMindmap(); break;
      case 'answer':
        state.quizState.answers[state.quizState.idx] = parseInt(data.idx);
        render(); break;
      case 'quiz-check':
        state.quizState.showExp = true; render(); break;
      case 'quiz-next':
        state.quizState.idx++; state.quizState.showExp = false; render(); break;
      case 'quiz-prev':
        state.quizState.idx--; state.quizState.showExp = state.quizState.answers[state.quizState.idx]!==undefined;
        render(); break;
      case 'quiz-finish': {
        const q = state.currentQuiz;
        let correct = 0;
        q.questions.forEach((qq, i) => { if(qq.type !== 'short' && state.quizState.answers[i] === qq.correctIndex) correct++; });
        const gradable = q.questions.filter(qq => qq.type !== 'short').length;
        state.results.push({
          notebookId: state.activeNotebook.id,
          notebook: state.activeNotebook.title,
          difficulty: q.difficulty,
          correct, total: gradable, date: Date.now(),
        });
        save();
        state.quizState.finished = true;
        render(); break;
      }
      case 'quiz-exit':
        if(confirm('Exit quiz? Progress lost.')){
          state.currentQuiz = null; state.quizState = null; state.page = 'notebook'; render();
        }
        break;
      case 'quiz-review':
        state.quizState.idx = 0; state.quizState.showExp = true; state.quizState.finished = false;
        render(); break;
      case 'quiz-retry':
        state.currentQuiz = null; state.quizState = null; state.page = 'quiz-setup';
        render(); break;
      case 'flip':
        state.flashState.flipped = !state.flashState.flipped; render(); break;
      case 'flash-next':
        state.flashState.idx++; state.flashState.flipped = false; render(); break;
      case 'flash-prev':
        state.flashState.idx--; state.flashState.flipped = false; render(); break;
      case 'flash-exit':
        state.currentFlashcards = null; state.flashState = null; render(); break;
      case 'mind-exit':
        state.currentMindmap = null; render(); break;
      case 'mind-view':
        state.mindmapView = data.mode;
        render();
        break;
      case 'mind-download': {
        // Download as PNG
        const svg = document.querySelector('#mindmapWrap svg');
        if(!svg){ toast('Switch to Radial view first'); return; }
        downloadSvgAsPng(svg, 'mindmap.png');
        break;
      }
    }
  }

  // ===== Source-adding helpers =====
  function addSource(srcData){
    const text = srcData.text;
    const chunks = chunkText(text, 1000);
    const source = {
      id: 'src_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
      type: srcData.type,
      name: srcData.name,
      text,
      chunks,
      added: Date.now(),
    };
    state.activeNotebook.sources.push(source);
    // Reset studio (sources changed)
    state.activeNotebook.studio = {};
    state.activeNotebook.suggestedQs = [];
    save();
    toast(`✨ Added "${source.name}" (${chunks.length} chunks)`);
  }

  async function addPDFSource(file){
    state.loading = { text: 'Parsing PDF...', sub: file.name };
    render();
    try {
      const { text, pageCount } = await extractPDF(file);
      if(text.trim().length < 100){
        state.loading = null;
        toast('⚠️ No text found. Scanned PDF?');
        render(); return;
      }
      addSource({ type: 'pdf', name: file.name.replace(/\.pdf$/i,''), text });
      state.loading = null;
      render();
    } catch(e){
      state.loading = null;
      toast('❌ ' + e.message);
      render();
    }
  }

  async function addLinkSource(url){
    state.loading = { text: 'Fetching page...', sub: url };
    render();
    try {
      const text = await fetchURL(url);
      let name;
      try { name = new URL(url).hostname.replace(/^www\./,''); } catch(e){ name = url; }
      addSource({ type: 'link', name: name + ' · ' + url.substring(0,40), text });
      state.loading = null;
      render();
    } catch(e){
      state.loading = null;
      toast('❌ ' + e.message);
      render();
    }
  }

  // ===== Chat send =====
  async function sendMessage(forceText){
    const nb = state.activeNotebook;
    if(!nb) return;
    const input = $('chatInput');
    const text = (forceText || (input ? input.value.trim() : '')).trim();
    if(!text) return;
    if(!state.apiKey){ state.modal = { type: 'apikey' }; render(); return; }

    if(!state.chatHistory[nb.id]) state.chatHistory[nb.id] = [];
    state.chatHistory[nb.id].push({ role: 'user', content: text });
    if(input){ input.value = ''; input.style.height = 'auto'; }
    state.chatThinking = true;
    render();

    try {
      const answer = await askQuestion(nb, text);
      state.chatHistory[nb.id].push({ role: 'assistant', content: answer });
      state.chatThinking = false;
      render();
    } catch(e){
      state.chatHistory[nb.id].push({ role: 'assistant', content: '❌ ' + e.message });
      state.chatThinking = false;
      render();
    }
  }

  async function doSuggestQuestions(){
    const nb = state.activeNotebook;
    if(!state.apiKey){ state.modal = { type: 'apikey' }; render(); return; }
    state.loading = { text: 'Generating questions...', sub: '' };
    render();
    try {
      const qs = await suggestQuestions(nb);
      nb.suggestedQs = qs;
      save();
      state.loading = null;
      render();
    } catch(e){
      state.loading = null;
      toast('❌ ' + e.message);
      render();
    }
  }

  async function doStudio(type, regen = false){
    const nb = state.activeNotebook;
    if(!state.apiKey){ state.modal = { type: 'apikey' }; render(); return; }
    nb.studio = nb.studio || {};
    if(nb.studio[type] && !regen){
      state.studioView = { type, content: nb.studio[type], notebookId: nb.id };
      render();
      return;
    }
    const labels = {
      summary: 'Generating briefing document...',
      studyguide: 'Building study guide...',
      faq: 'Crafting exam questions...',
    };
    state.loading = { text: labels[type], sub: 'Reading & synthesizing your sources' };
    render();
    try {
      let content;
      if(type === 'summary') content = await generateSummary(nb);
      else if(type === 'studyguide') content = await generateStudyGuide(nb);
      else if(type === 'faq') content = await generateFAQ(nb);
      nb.studio[type] = content;
      save();
      state.loading = null;
      state.studioView = { type, content, notebookId: nb.id };
      render();
    } catch(e){
      state.loading = null;
      toast('❌ ' + e.message);
      render();
    }
  }

  async function startQuizGen(){
    const nb = state.activeNotebook;
    if(!state.apiKey){ state.modal = { type: 'apikey' }; render(); return; }
    state.loading = { text: 'Crafting quiz...', sub: `${state.quizConfig.count} ${state.quizConfig.difficulty} questions` };
    render();
    try {
      const questions = await generateQuiz(nb, state.quizConfig);
      if(!questions || questions.length === 0) throw new Error('No questions generated');
      state.currentQuiz = { notebookId: nb.id, difficulty: state.quizConfig.difficulty, questions };
      state.quizState = { idx: 0, answers: {}, showExp: false };
      state.loading = null;
      render();
    } catch(e){
      state.loading = null;
      toast('❌ ' + e.message);
      render();
    }
  }

  async function doFlashcards(){
    const nb = state.activeNotebook;
    if(!state.apiKey){ state.modal = { type: 'apikey' }; render(); return; }
    state.loading = { text: 'Building flashcards...', sub: '' };
    render();
    try {
      const cards = await generateFlashcards(nb);
      if(!cards || cards.length === 0) throw new Error('No cards generated');
      state.currentFlashcards = { notebookId: nb.id, cards };
      state.flashState = { idx: 0, flipped: false };
      state.loading = null;
      render();
    } catch(e){
      state.loading = null;
      toast('❌ ' + e.message);
      render();
    }
  }

  async function doMindmap(){
    const nb = state.activeNotebook;
    if(!state.apiKey){ state.modal = { type: 'apikey' }; render(); return; }
    state.loading = { text: 'Mapping concepts...', sub: '' };
    render();
    try {
      const mm = await generateMindmap(nb);
      state.currentMindmap = mm;
      state.loading = null;
      render();
    } catch(e){
      state.loading = null;
      toast('❌ ' + e.message);
      render();
    }
  }

  // Boot
  render();
</script>
</body>
</html>
