<title>StudySpark | AI Notebooks</title>

<style>
  :root{
    --bg:#fff8ec; --ink:#1a1530; --paper:#fff;
    --pink:#ff5b8a; --tangerine:#ff7a3d; --sun:#ffd23f;
    --lime:#b8e62e; --teal:#2dd4bf; --grape:#8b5cf6;
    --shadow:6px 6px 0 var(--ink); --shadow-sm:3px 3px 0 var(--ink); --shadow-lg:10px 10px 0 var(--ink);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Outfit',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden;
    background-image:radial-gradient(circle at 20% 10%,rgba(255,91,138,.12) 0,transparent 40%),radial-gradient(circle at 80% 80%,rgba(45,212,191,.12) 0,transparent 40%),radial-gradient(circle at 50% 50%,rgba(255,210,63,.08) 0,transparent 60%);
  }
  body::before{content:"";position:fixed;inset:0;background-image:radial-gradient(circle,rgba(26,21,48,.06) 1px,transparent 1px);background-size:22px 22px;pointer-events:none;z-index:0}
  h1,h2,h3,h4{font-family:'Fraunces',serif;font-weight:800;letter-spacing:-0.02em;line-height:1.05}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit}

  .app{display:flex;min-height:100vh;position:relative;z-index:1}
  .sidebar{width:260px;flex-shrink:0;background:var(--ink);color:#fff8ec;padding:28px 20px;display:flex;flex-direction:column;gap:8px;position:sticky;top:0;height:100vh;border-right:3px solid var(--ink)}
  .logo{font-family:'Fraunces',serif;font-weight:900;font-size:28px;color:var(--sun);letter-spacing:-0.03em;margin-bottom:24px;display:flex;align-items:center;gap:8px}
  .logo .dot{display:inline-block;width:14px;height:14px;border-radius:50%;background:var(--pink);box-shadow:3px 3px 0 var(--sun);transform:translateY(-4px)}
  .nav-item{text-align:left;padding:12px 14px;border-radius:12px;font-weight:600;font-size:15px;color:#fff8ec;opacity:.7;transition:all .15s ease;display:flex;align-items:center;gap:10px;border:2px solid transparent}
  .nav-item:hover{opacity:1;background:rgba(255,255,255,.06)}
  .nav-item.active{background:var(--sun);color:var(--ink);opacity:1;border-color:var(--ink);box-shadow:3px 3px 0 var(--pink);transform:translate(-2px,-2px)}
  .nav-icon{font-size:18px}
  .api-status{margin-top:auto;padding:14px;border-radius:14px;background:rgba(255,255,255,.06);font-size:13px;border:2px dashed rgba(255,248,236,.2)}
  .api-status .label{opacity:.6;margin-bottom:6px;font-size:11px;text-transform:uppercase;letter-spacing:.1em}
  .api-status .value{font-weight:600}
  .api-status.ok .value{color:var(--lime)}
  .api-status.no .value{color:var(--pink)}

  .main{flex:1;padding:36px 44px 80px;max-width:1500px;overflow-x:hidden;width:100%}
  .page-title{font-size:48px;margin-bottom:6px}
  .page-sub{color:rgba(26,21,48,.6);font-size:17px;margin-bottom:32px;font-weight:500}

  .card{background:var(--paper);border:3px solid var(--ink);border-radius:20px;box-shadow:var(--shadow);padding:24px}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:12px 20px;border:3px solid var(--ink);border-radius:14px;font-weight:700;font-size:15px;background:var(--sun);box-shadow:var(--shadow-sm);transition:all .12s ease}
  .btn:hover{transform:translate(-2px,-2px);box-shadow:5px 5px 0 var(--ink)}
  .btn:active{transform:translate(2px,2px);box-shadow:none}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn-pink{background:var(--pink);color:#fff}
  .btn-teal{background:var(--teal)}
  .btn-lime{background:var(--lime)}
  .btn-grape{background:var(--grape);color:#fff}
  .btn-ghost{background:transparent;box-shadow:none}
  .btn-ghost:hover{background:rgba(26,21,48,.05);box-shadow:none;transform:none}
  .btn-sm{padding:8px 14px;font-size:13px;box-shadow:2px 2px 0 var(--ink)}

  .pill{display:inline-block;padding:4px 12px;border-radius:999px;background:var(--ink);color:#fff8ec;font-size:12px;font-weight:600;letter-spacing:.04em}
  .pill-sun{background:var(--sun);color:var(--ink)}
  .pill-pink{background:var(--pink);color:#fff}
  .pill-teal{background:var(--teal);color:var(--ink)}
  .pill-lime{background:var(--lime);color:var(--ink)}

  /* Stats */
  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:32px}
  .stat{padding:22px;border-radius:20px;border:3px solid var(--ink);box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
  .stat:nth-child(1){background:var(--pink);color:#fff}
  .stat:nth-child(2){background:var(--sun)}
  .stat:nth-child(3){background:var(--teal)}
  .stat:nth-child(4){background:var(--lime)}
  .stat .num{font-family:'Fraunces',serif;font-weight:900;font-size:48px;line-height:1}
  .stat .lbl{font-weight:600;font-size:14px;margin-top:8px;opacity:.85}
  .stat .decoration{position:absolute;right:-10px;bottom:-10px;font-size:60px;opacity:.2;transform:rotate(-10deg)}

  .section-title{font-size:28px;margin:32px 0 16px;display:flex;align-items:center;gap:12px}
  .section-title::after{content:"";flex:1;height:3px;background:var(--ink);border-radius:3px;max-width:200px;opacity:.15}

  /* Notebook grid */
  .nb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
  .nb-card{background:var(--paper);border:3px solid var(--ink);border-radius:20px;padding:22px;box-shadow:var(--shadow-sm);transition:all .15s ease;cursor:pointer;position:relative;overflow:hidden;text-align:left}
  .nb-card:hover{transform:translate(-3px,-3px) rotate(-.5deg);box-shadow:var(--shadow)}
  .nb-card .emoji{font-size:42px;margin-bottom:10px}
  .nb-card h3{font-size:22px;margin-bottom:6px;line-height:1.2}
  .nb-card .meta{font-size:13px;color:rgba(26,21,48,.55);font-weight:500;margin-bottom:14px}
  .nb-card .nb-stats{display:flex;gap:6px;flex-wrap:wrap}

  .nb-new{background:var(--sun);border-style:dashed;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:200px;font-weight:700}
  .nb-new:hover{background:#fff8ec}
  .nb-new .big{font-size:48px;margin-bottom:8px}

  /* Notebook layout (3-column on desktop, tabs on mobile) */
  .nb-layout{display:grid;grid-template-columns:300px 1fr 320px;gap:20px;min-height:calc(100vh - 100px)}
  .nb-panel{background:var(--paper);border:3px solid var(--ink);border-radius:20px;padding:18px;box-shadow:var(--shadow-sm);overflow-y:auto;max-height:calc(100vh - 80px)}
  .nb-panel h3{font-size:18px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:8px}
  .nb-panel h3 .ico{font-size:22px}

  /* Mobile tab bar (hidden on desktop) */
  .nb-tabs{display:none;gap:6px;margin-bottom:14px;background:#fff;border:3px solid var(--ink);border-radius:14px;padding:5px;position:sticky;top:0;z-index:10;box-shadow:var(--shadow-sm)}
  .nb-tab{flex:1;padding:10px 6px;border-radius:9px;background:transparent;font-weight:700;font-size:13px;text-align:center;border:none;cursor:pointer;transition:all .12s;display:flex;align-items:center;justify-content:center;gap:4px}
  .nb-tab.active{background:var(--sun);box-shadow:2px 2px 0 var(--ink);transform:translate(-1px,-1px)}
  .nb-tab .badge{background:var(--pink);color:#fff;font-size:10px;padding:1px 5px;border-radius:99px;font-family:'JetBrains Mono',monospace}

  .source-item{padding:12px;border:2px solid var(--ink);border-radius:12px;margin-bottom:10px;background:#fff;font-size:13px;display:flex;gap:10px;align-items:flex-start;cursor:pointer;transition:all .12s}
  .source-item:hover{background:var(--sun)}
  .source-item.selected{background:var(--sun);box-shadow:2px 2px 0 var(--ink);transform:translate(-1px,-1px)}
  .source-item .src-ico{font-size:20px;flex-shrink:0}
  .source-item .src-body{flex:1;min-width:0}
  .source-item .src-title{font-weight:600;word-break:break-word;line-height:1.3}
  .source-item .src-meta{font-size:11px;color:rgba(26,21,48,.55);margin-top:3px}
  .source-item .src-del{font-size:14px;opacity:.4;cursor:pointer;flex-shrink:0}
  .source-item .src-del:hover{opacity:1;color:var(--pink)}
  .source-num{display:inline-block;background:var(--ink);color:#fff8ec;font-family:'JetBrains Mono',monospace;font-size:11px;padding:2px 6px;border-radius:5px;font-weight:600;margin-right:6px}

  .add-source-btns{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
  .add-src-btn{padding:10px 14px;border:2px dashed var(--ink);border-radius:10px;background:#fff;font-weight:600;font-size:13px;text-align:left;display:flex;align-items:center;gap:8px;cursor:pointer;transition:all .12s}
  .add-src-btn:hover{background:var(--sun);border-style:solid}

  /* Chat */
  .chat-area{display:flex;flex-direction:column;height:100%}
  .chat-messages{flex:1;overflow-y:auto;padding:6px 4px 16px;display:flex;flex-direction:column;gap:14px;min-height:300px}
  .msg{padding:14px 18px;border-radius:18px;border:3px solid var(--ink);max-width:88%;line-height:1.55;font-size:15px;animation:slideUp .3s ease}
  @keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .msg.user{align-self:flex-end;background:var(--pink);color:#fff;border-bottom-right-radius:6px}
  .msg.assistant{align-self:flex-start;background:#fff;border-bottom-left-radius:6px;box-shadow:var(--shadow-sm)}
  .msg.assistant strong{font-weight:700;color:var(--ink)}
  .citation-pill{display:inline-block;background:var(--teal);color:var(--ink);padding:1px 6px;border-radius:5px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;margin:0 1px;cursor:pointer;border:1.5px solid var(--ink);transition:all .1s;vertical-align:2px;line-height:1.3}
  .citation-pill:hover{background:var(--sun);transform:translateY(-1px)}
  .msg.thinking{background:#fff;font-style:italic;opacity:.7}
  .msg.thinking::after{content:"●●●";letter-spacing:4px;animation:thinking 1.2s infinite}
  @keyframes thinking{0%,100%{opacity:.3}50%{opacity:1}}

  .chat-input-row{display:flex;gap:10px;align-items:flex-end;padding-top:14px;border-top:2px dashed rgba(26,21,48,.15)}
  .chat-input{flex:1;border:3px solid var(--ink);border-radius:14px;padding:12px 14px;font-size:15px;resize:none;font-family:inherit;background:#fff;font-weight:500;min-height:48px;max-height:120px}
  .chat-input:focus{outline:none;background:#fff8ec}
  .chat-empty{text-align:center;padding:40px 20px;color:rgba(26,21,48,.5)}
  .chat-empty .big{font-size:48px;margin-bottom:12px}
  .chat-empty h3{font-size:22px;margin-bottom:8px;color:var(--ink)}
  .suggested-q{margin-top:18px;display:flex;flex-direction:column;gap:8px;max-width:480px;margin-left:auto;margin-right:auto}
  .suggested-q button{padding:10px 16px;border:2px solid var(--ink);border-radius:12px;background:#fff;text-align:left;font-weight:500;font-size:14px;cursor:pointer;transition:all .12s}
  .suggested-q button:hover{background:var(--sun);transform:translate(-2px,-2px);box-shadow:3px 3px 0 var(--ink)}

  /* Studio panel */
  .studio-tile{padding:14px;border:2px solid var(--ink);border-radius:12px;margin-bottom:10px;background:#fff;cursor:pointer;transition:all .12s;text-align:left;width:100%;display:flex;align-items:center;gap:12px}
  .studio-tile:hover{transform:translate(-2px,-2px);box-shadow:3px 3px 0 var(--ink)}
  .studio-tile.has-content{background:var(--lime)}
  .studio-tile .st-ico{font-size:26px;flex-shrink:0}
  .studio-tile .st-body{flex:1;min-width:0}
  .studio-tile .st-title{font-weight:700;font-size:14px}
  .studio-tile .st-desc{font-size:11px;color:rgba(26,21,48,.6);margin-top:2px}

  /* Citation modal/popover */
  .cite-popup{background:var(--paper);border:3px solid var(--ink);border-radius:16px;padding:20px;box-shadow:var(--shadow);max-width:520px;width:100%;max-height:80vh;overflow-y:auto}
  .cite-popup .label{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--pink);font-weight:700;letter-spacing:.1em;margin-bottom:8px}
  .cite-popup .source-name{font-family:'Fraunces',serif;font-weight:700;font-size:18px;margin-bottom:12px;word-break:break-word}
  .cite-popup .passage{font-size:14px;line-height:1.6;background:var(--sun);padding:14px;border-radius:10px;border:2px solid var(--ink);max-height:50vh;overflow-y:auto;white-space:pre-wrap}

  /* Studio content viewer (large modal) */
  .studio-viewer{padding:0}
  .studio-viewer h2{font-size:32px;margin-bottom:8px}
  .studio-viewer .meta{font-size:13px;color:rgba(26,21,48,.6);margin-bottom:18px;font-weight:500}
  .studio-content{line-height:1.75;font-size:15px;color:#1a1530}
  .studio-content h2{font-family:'Fraunces',serif;font-size:24px;margin:28px 0 14px;font-weight:800;padding-bottom:10px;border-bottom:3px solid var(--ink);display:flex;align-items:center;gap:10px}
  .studio-content h2:first-child{margin-top:0}
  .studio-content h2::before{content:"";display:inline-block;width:8px;height:24px;background:var(--pink);border-radius:3px;flex-shrink:0}
  .studio-content h3{font-family:'Fraunces',serif;font-size:18px;margin:18px 0 8px;font-weight:700}
  .studio-content p{margin-bottom:14px;line-height:1.75}
  .studio-content ul,.studio-content ol{margin:8px 0 16px 24px;padding-left:6px}
  .studio-content li{margin-bottom:10px;line-height:1.65}
  .studio-content li strong:first-child{display:inline-block;margin-right:4px}
  .studio-content strong{font-weight:700;color:#1a1530}
  .studio-content em{font-style:normal;background:rgba(255,210,63,.25);padding:1px 4px;border-radius:3px}
  .studio-content .key-term{background:var(--sun);padding:1px 6px;border-radius:4px;font-weight:600;border:2px solid var(--ink)}
  .faq-item{border:2px solid var(--ink);border-radius:14px;margin-bottom:14px;background:#fff;overflow:hidden}
  .faq-q{padding:14px 16px;background:var(--teal);font-weight:700;cursor:pointer;display:flex;align-items:flex-start;gap:10px;line-height:1.4}
  .faq-q::before{content:"Q";font-family:'Fraunces',serif;font-size:18px;flex-shrink:0;background:var(--ink);color:var(--teal);width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center}
  .faq-a{padding:16px 18px;border-top:2px dashed var(--ink);font-size:14px;line-height:1.7}

  /* Upload zone */
  .upload-zone{border:3px dashed var(--ink);border-radius:18px;padding:32px 20px;text-align:center;background:#fff;cursor:pointer;transition:all .2s ease;font-size:14px}
  .upload-zone:hover{background:#fff8ec}
  .upload-zone.drag{background:var(--sun);border-style:solid}
  .upload-zone .ico{font-size:42px;margin-bottom:8px}

  /* Input field */
  .input,.select,.textarea{width:100%;padding:12px 14px;border:3px solid var(--ink);border-radius:12px;font-size:15px;background:#fff;font-weight:500}
  .input:focus,.select:focus,.textarea:focus{outline:none;background:var(--sun)}
  .textarea{resize:vertical;min-height:80px;font-family:inherit}
  .field{margin-bottom:18px}
  .field label{display:block;font-weight:600;font-size:14px;margin-bottom:8px}

  .chip-row{display:flex;flex-wrap:wrap;gap:8px}
  .chip{padding:8px 16px;border:3px solid var(--ink);border-radius:999px;background:#fff;font-weight:600;font-size:14px;cursor:pointer;transition:all .12s ease}
  .chip:hover{background:#fff8ec}
  .chip.active{background:var(--pink);color:#fff;box-shadow:2px 2px 0 var(--ink);transform:translate(-1px,-1px)}
  .chip-sun.active{background:var(--sun);color:var(--ink)}
  .chip-teal.active{background:var(--teal);color:var(--ink)}
  .number-pick{display:flex;gap:8px;align-items:center}
  .number-pick .chip{flex:1;text-align:center;padding:10px 0}

  /* Quiz player */
  .quiz-player{max-width:780px;margin:0 auto}
  .quiz-progress{display:flex;align-items:center;gap:14px;margin-bottom:24px}
  .quiz-progress .bar{flex:1;height:14px;background:#fff;border:3px solid var(--ink);border-radius:999px;overflow:hidden}
  .quiz-progress .fill{height:100%;background:var(--lime);border-right:3px solid var(--ink);transition:width .4s cubic-bezier(.34,1.56,.64,1)}
  .quiz-progress .count{font-weight:700;font-family:'JetBrains Mono',monospace;font-size:14px}
  .quiz-question{background:var(--paper);border:3px solid var(--ink);border-radius:24px;padding:34px;box-shadow:var(--shadow);margin-bottom:20px;animation:slideUp .4s ease}
  .q-num{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--pink);font-weight:600;margin-bottom:8px;letter-spacing:.1em}
  .q-text{font-family:'Fraunces',serif;font-size:26px;font-weight:700;line-height:1.3;margin-bottom:24px}
  .q-options{display:flex;flex-direction:column;gap:12px}
  .q-option{padding:18px 20px;border:3px solid var(--ink);border-radius:14px;background:#fff;cursor:pointer;text-align:left;font-size:16px;font-weight:500;display:flex;align-items:center;gap:14px;transition:all .15s ease;line-height:1.4}
  .q-option:hover{background:#fff8ec;transform:translate(-2px,-2px);box-shadow:3px 3px 0 var(--ink)}
  .q-option.selected{background:var(--sun);box-shadow:3px 3px 0 var(--ink);transform:translate(-2px,-2px)}
  .q-option.correct{background:var(--lime);box-shadow:3px 3px 0 var(--ink)}
  .q-option.incorrect{background:var(--pink);color:#fff;box-shadow:3px 3px 0 var(--ink)}
  .q-option .letter{width:34px;height:34px;border-radius:8px;background:var(--ink);color:#fff8ec;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;font-family:'JetBrains Mono',monospace}
  .q-option.correct .letter{background:#0a4d2c;color:var(--lime)}
  .q-option.incorrect .letter{background:#4a0a1d;color:var(--pink)}
  .explanation{margin-top:20px;padding:20px;border:3px solid var(--ink);border-radius:14px;background:var(--sun);animation:slideUp .3s ease}
  .explanation .label{font-weight:700;font-size:13px;letter-spacing:.1em;margin-bottom:8px;text-transform:uppercase}
  .explanation .text{font-size:15px;line-height:1.5;font-weight:500}
  .quiz-actions{display:flex;justify-content:space-between;gap:12px;margin-top:20px}
  .results{text-align:center;max-width:680px;margin:0 auto}

</style>

<body>
<div id="app" class="app"></div>
<script type="module">
  // ===============================================================
  // ====  EMBEDDED FIREBASE CONFIG  ===============================
  // ====  FILL IN YOUR VALUES BELOW BEFORE DEPLOYING  =============
  // ===============================================================
  //
  // These are safe to commit to a public repo. Firebase is designed so
  // the config can be public — security comes from Firestore rules +
  // the email allowlist below.
  //
  // To get these values:
  // 1. Firebase Console → Project Settings (gear icon) → General tab
  // 2. Scroll to "Your apps" → web app
  // 3. Copy projectId, apiKey, authDomain into the strings below
  //
  // Set EMBEDDED_CONFIG.enabled = false to disable auto-config and
  // fall back to the manual setup flow (where you paste config in-app).
  //
  const EMBEDDED_CONFIG = {
    enabled: true,  // Set to false to use manual sync setup instead

    projectId: 'studyspark-fc6f9',          // e.g. 'studyspark-a1b2c'
    apiKey:    'AIzaSyCGhZ5PhyLPUZutXIbooyl_GqveKhYfyzI',    // e.g. 'AIzaSy...'
    authDomain:'studyspark-fc6f9.firebaseapp.com',         // e.g. 'studyspark-a1b2c.firebaseapp.com'

    // Email allowlist - ONLY these emails can sign in.
    // Add yours (lowercase) and any family/team members you want to grant access.
    allowedEmails: [
      'sawandobariya.uk@gmail.com',
    ],
  };
  // ===============================================================

  // ===== Firebase (lazy-loaded only when sync is enabled) =====
  let fb = null; // { app, auth, db, user, listeners: [], suppressNext: false, googleUser: {...} }
  async function loadFirebase(){
    if(window._firebaseLoaded) return window._firebaseLoaded;
    const V = '12.13.0';
    const [app, auth, fs] = await Promise.all([
      import(`https://www.gstatic.com/firebasejs/${V}/firebase-app.js`),
      import(`https://www.gstatic.com/firebasejs/${V}/firebase-auth.js`),
      import(`https://www.gstatic.com/firebasejs/${V}/firebase-firestore.js`),
    ]);
    window._firebaseLoaded = { app, auth, fs };
    return window._firebaseLoaded;
  }

  function configIsEmbedded(){
    return EMBEDDED_CONFIG.enabled
      && EMBEDDED_CONFIG.projectId
      && !EMBEDDED_CONFIG.projectId.includes('YOUR_')
      && EMBEDDED_CONFIG.apiKey
      && !EMBEDDED_CONFIG.apiKey.includes('YOUR_');
  }

  // ===== State =====
  const state = {
    page: 'home',
    apiKey: localStorage.getItem('ss_api_key') || '',
    notebooks: JSON.parse(localStorage.getItem('ss_notebooks') || '[]'),
    results: JSON.parse(localStorage.getItem('ss_results') || '[]'),
    chatHistory: JSON.parse(localStorage.getItem('ss_chat') || '{}'),
    syncConfig: JSON.parse(localStorage.getItem('ss_sync_config') || 'null'), // {projectId, apiKey, authDomain, syncCode}
    syncStatus: 'offline', // offline | connecting | live | error | signin-needed | unauthorized
    syncError: '',
    googleUser: null, // {email, name, photoURL, uid}
    signInPending: false,
    mobileTab: 'chat', // sources | chat | studio - which panel shows on mobile
    activeNotebook: null,
    selectedSources: null, // Set of source IDs selected for chat/study aids (null = all)
    currentQuiz: null,
    quizState: null,
    quizConfig: { count: 10, difficulty: 'medium', types: ['mcq'], focus: '' },
    currentFlashcards: null,
    flashState: null,
    currentMindmap: null,
    mindmapView: 'radial',
    studioView: null, // { type: 'summary'|'studyguide'|'faq', content, notebookId }
    modal: null,
    toast: null,
    citePopup: null, // {x, y, sourceNum, chunkIdx}
    loading: null,
  };

  const NOTEBOOK_EMOJIS = ['📘','📗','📙','📕','📓','📔','📒','🗒️','📚','🎓','🧪','⚗️','🔬','🌐','💼','⚖️','🧮','🎨'];

  function save(opts = {}){
    localStorage.setItem('ss_notebooks', JSON.stringify(state.notebooks));
    localStorage.setItem('ss_results', JSON.stringify(state.results));
    localStorage.setItem('ss_chat', JSON.stringify(state.chatHistory));
    // Trigger sync push if connected (debounced)
    if(fb && fb.user && !opts.noSync) schedulePush();
  }

  const $ = (id) => document.getElementById(id);
  const root = $('app');

  // ===== Passcode gate =====
  async function sha256(str){
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  const LOCK = {
    storedHash: () => localStorage.getItem('ss_pass_hash'),
    sessionOK: () => sessionStorage.getItem('ss_unlocked') === '1',
    failures: () => parseInt(localStorage.getItem('ss_fails') || '0'),
    lockedUntil: () => parseInt(localStorage.getItem('ss_locked_until') || '0'),
  };

  function lockScreen(mode){
    const locked = LOCK.lockedUntil() > Date.now();
    const waitMin = locked ? Math.ceil((LOCK.lockedUntil() - Date.now()) / 60000) : 0;
    document.body.innerHTML = `
      <style>
        body{display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Outfit',sans-serif;background:var(--bg);padding:20px}
        .lock-card{background:#fff;border:3px solid var(--ink);border-radius:24px;box-shadow:10px 10px 0 var(--ink);padding:36px;max-width:420px;width:100%;text-align:center}
        .lock-card .ico{font-size:64px;margin-bottom:12px}
        .lock-card h1{font-family:'Fraunces',serif;font-size:36px;margin-bottom:8px;font-weight:800;letter-spacing:-0.02em}
        .lock-card p{color:rgba(26,21,48,.65);font-weight:500;margin-bottom:24px;line-height:1.5}
        .lock-card input{width:100%;padding:16px;border:3px solid var(--ink);border-radius:14px;font-size:20px;font-weight:600;text-align:center;letter-spacing:.2em;font-family:'JetBrains Mono',monospace;margin-bottom:14px}
        .lock-card input:focus{outline:none;background:var(--sun)}
        .lock-btn{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border:3px solid var(--ink);border-radius:14px;font-weight:700;font-size:16px;background:var(--pink);color:#fff;box-shadow:3px 3px 0 var(--ink);cursor:pointer;font-family:inherit;width:100%;justify-content:center;transition:all .12s}
        .lock-btn:hover{transform:translate(-2px,-2px);box-shadow:5px 5px 0 var(--ink)}
        .lock-err{color:#c0264f;font-weight:600;font-size:14px;margin-top:8px;min-height:20px}
        .lock-hint{font-size:12px;color:rgba(26,21,48,.5);margin-top:18px;line-height:1.5}
      </style>
      <div class="lock-card">
        <div class="ico">${locked?'⏳':mode==='setup'?'🔐':'🔒'}</div>
        <h1>${locked?'Locked out':mode==='setup'?'Set a passcode':'StudySpark'}</h1>
        <p>${locked?`Too many wrong tries. Try again in ${waitMin} min.`:mode==='setup'?'Choose a 4–8 digit code. You\'ll enter it once per device.':'Enter your passcode to continue.'}</p>
        ${!locked?`<input id="lock-input" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="8" placeholder="••••" autocomplete="off" autofocus>
          ${mode==='setup'?`<input id="lock-input-2" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="8" placeholder="Confirm" autocomplete="off">`:''}
          <button class="lock-btn" id="lock-go">${mode==='setup'?'✨ Set passcode':'🔓 Unlock'}</button>
          <div class="lock-err" id="lock-err"></div>
          <div class="lock-hint">${mode==='unlock'?'Forgot? Clear site data in your browser to reset.':'Hashed locally, never sent anywhere.'}</div>`:''}
      </div>`;
    if(locked) return;
    const go = async () => {
      const v = $('lock-input').value.trim();
      const err = $('lock-err');
      if(!v || v.length < 4){ err.textContent = 'At least 4 digits'; return; }
      if(mode === 'setup'){
        const v2 = $('lock-input-2').value.trim();
        if(v !== v2){ err.textContent = 'Codes don\'t match'; return; }
        localStorage.setItem('ss_pass_hash', await sha256(v));
        sessionStorage.setItem('ss_unlocked', '1');
        location.reload();
      } else {
        if((await sha256(v)) === LOCK.storedHash()){
          localStorage.setItem('ss_fails', '0');
          sessionStorage.setItem('ss_unlocked', '1');
          location.reload();
        } else {
          const fails = LOCK.failures() + 1;
          localStorage.setItem('ss_fails', String(fails));
          if(fails >= 5){
            localStorage.setItem('ss_locked_until', String(Date.now() + 15*60*1000));
            err.textContent = 'Too many tries. Locked 15 min.';
            setTimeout(() => location.reload(), 1500);
          } else { err.textContent = `Wrong. ${5-fails} left.`; $('lock-input').value=''; }
        }
      }
    };
    $('lock-go').onclick = go;
    $('lock-input').onkeydown = (e) => { if(e.key === 'Enter'){
      if(mode === 'setup' && $('lock-input-2')) $('lock-input-2').focus(); else go();
    }};
    if($('lock-input-2')) $('lock-input-2').onkeydown = (e) => { if(e.key === 'Enter') go(); };
  }

  if(!LOCK.storedHash()){ lockScreen('setup'); throw new Error('LOCK'); }
  if(!LOCK.sessionOK()){ lockScreen('unlock'); throw new Error('LOCK'); }

  // ===== Toast =====
  function toast(msg){
    state.toast = msg;
    render();
    setTimeout(() => { state.toast = null; render(); }, 3200);
  }

  // ===== Firebase Sync Engine =====
  // Data shape in Firestore:
  // /users/{syncCode}/state/main  -> { notebooks (without source.text/chunks), results, chatHistory, updatedAt }
  // /users/{syncCode}/sources/{sourceId} -> { text, chunks } (kept separate to avoid 1MB doc limit)

  let pushTimer = null;
  function schedulePush(){
    if(pushTimer) clearTimeout(pushTimer);
    pushTimer = setTimeout(() => pushToFirebase().catch(e => console.error('Push failed:', e)), 1500);
  }

  function makeShallowNotebooks(notebooks){
    // Strip out heavy source.text/chunks; keep meta. Sources' actual text lives in /sources/{id}.
    return notebooks.map(nb => ({
      ...nb,
      sources: nb.sources.map(s => ({
        id: s.id, type: s.type, name: s.name, added: s.added,
        chunkCount: s.chunks?.length || 0,
      })),
    }));
  }

  // Returns the Firestore path identifier for the current user.
  // When using Google auth, this is the user's UID (so the same email = same data).
  // When using anonymous auth, falls back to the manual sync code.
  function getSyncPath(){
    if(!fb) return null;
    if(fb.googleUser) return fb.googleUser.uid;
    return fb.syncCode;
  }

  // ===== Google Sign-In flow =====
  async function initGoogleAuth(){
    if(!configIsEmbedded()){
      console.warn('No embedded config - skipping Google auth init');
      return;
    }
    state.syncStatus = 'connecting';
    render();
    try {
      const { app, auth, fs } = await loadFirebase();
      // Initialize Firebase with the embedded config
      const fbApp = app.initializeApp({
        apiKey: EMBEDDED_CONFIG.apiKey,
        authDomain: EMBEDDED_CONFIG.authDomain,
        projectId: EMBEDDED_CONFIG.projectId,
      }, 'studyspark_main');
      const fbAuth = auth.getAuth(fbApp);
      const fbDb = fs.getFirestore(fbApp);
      // Set local persistence so user stays logged in across refreshes
      try { await auth.setPersistence(fbAuth, auth.browserLocalPersistence); } catch(e){ /* ignore */ }
      // Save partial fb object for sign-in modal to use
      fb = { app: fbApp, auth: fbAuth, db: fbDb, fs, listeners: [], suppressNext: false, user: null, googleUser: null };

      // Listen for auth state changes (covers redirect-back too)
      auth.onAuthStateChanged(fbAuth, async (user) => {
        if(user && user.email){
          // Check allowlist
          const allowed = EMBEDDED_CONFIG.allowedEmails.map(e => e.trim().toLowerCase());
          if(!allowed.includes(user.email.toLowerCase())){
            state.syncStatus = 'unauthorized';
            state.syncError = `${user.email} is not authorized to use this app.`;
            await auth.signOut(fbAuth);
            fb.user = null; fb.googleUser = null;
            render();
            return;
          }
          // Authorized - set up
          fb.user = user;
          fb.googleUser = {
            uid: user.uid,
            email: user.email,
            name: user.displayName,
            photoURL: user.photoURL,
          };
          state.googleUser = fb.googleUser;
          state.signInPending = false;

          // Try to fetch saved Gemini API key from Firestore
          await loadGeminiKeyFromCloud();

          // Begin sync
          await beginSyncForGoogleUser();
        } else {
          // Signed out
          fb.user = null; fb.googleUser = null;
          state.googleUser = null;
          state.syncStatus = 'signin-needed';
          render();
        }
      });
    } catch(e){
      console.error(e);
      state.syncStatus = 'error';
      state.syncError = e.message || 'Failed to initialize';
      render();
    }
  }

  async function signInWithGoogle(){
    if(!fb || !fb.auth){
      await initGoogleAuth();
      // Wait briefly for fb to be ready
      await new Promise(r => setTimeout(r, 200));
    }
    if(!fb || !fb.auth){ toast('❌ Auth not initialized'); return; }
    const { auth } = await loadFirebase();
    const provider = new auth.GoogleAuthProvider();
    provider.setCustomParameters({ prompt: 'select_account' });
    state.signInPending = true;
    render();
    try {
      await auth.signInWithPopup(fb.auth, provider);
      // onAuthStateChanged handles the rest
    } catch(e){
      state.signInPending = false;
      console.error(e);
      if(e.code === 'auth/popup-closed-by-user' || e.code === 'auth/cancelled-popup-request'){
        // user dismissed, no toast
      } else if(e.code === 'auth/popup-blocked' || e.code === 'auth/unauthorized-domain'){
        // Fallback to redirect (popup blocked, mobile, etc.)
        try {
          await auth.signInWithRedirect(fb.auth, provider);
        } catch(e2){
          toast('❌ ' + (e2.message || 'Sign-in failed'));
        }
      } else {
        toast('❌ ' + (e.message || 'Sign-in failed'));
      }
      render();
    }
  }

  async function signOutGoogle(){
    if(!fb || !fb.auth) return;
    const { auth } = await loadFirebase();
    // Stop listeners
    fb.listeners.forEach(u => u());
    fb.listeners = [];
    await auth.signOut(fb.auth);
    state.googleUser = null;

  async function pushToFirebase(){
    if(!fb) return;
    const path = getSyncPath();
    if(!path) return;
    const { fs } = fb;
    const now = Date.now();
    const mainData = {
      notebooks: makeShallowNotebooks(state.notebooks),
      results: state.results,
      chatHistory: state.chatHistory,
      updatedAt: now,
    };
    state._lastPushTime = now;
    fb.suppressNext = true;
    const mainRef = fs.doc(fb.db, 'users', path, 'state', 'main');
    await fs.setDoc(mainRef, mainData);
    // Push sources (heavy text). Only push ones we haven't pushed before in this session
    if(!state._pushedSources) state._pushedSources = new Set();
    for(const nb of state.notebooks){
      for(const src of nb.sources){
        const key = src.id + ':' + (src.chunks?.length || 0);
        if(state._pushedSources.has(key)) continue;
        try {
          const srcRef = fs.doc(fb.db, 'users', path, 'sources', src.id);
          await fs.setDoc(srcRef, { text: src.text || '', chunks: src.chunks || [] });
          state._pushedSources.add(key);
        } catch(e){
          console.warn('Source push failed', src.id, e);
        }
      }
    }
  }

  async function pullFromFirebase(){
    if(!fb) return;

    if(!path) return;
    const { fs } = fb;
    const mainRef = fs.doc(fb.db, 'users', path, 'state', 'main');
    const snap = await fs.getDoc(mainRef);
    if(!snap.exists()) return;
    await pullDataIntoState(snap.data());
  }

  async function pullDataIntoState(data){
    if(!fb) return;
    const path = getSyncPath();
    if(!path) return;
    const { fs } = fb;
    const localSourceMap = {};
    state.notebooks.forEach(nb => nb.sources.forEach(s => { localSourceMap[s.id] = s; }));
    const newNotebooks = [];
    for(const nb of (data.notebooks || [])){
      const sources = [];
      for(const ssrc of (nb.sources || [])){
        if(localSourceMap[ssrc.id]){
          sources.push({ ...ssrc, text: localSourceMap[ssrc.id].text, chunks: localSourceMap[ssrc.id].chunks });
        } else {
          try {
            const sRef = fs.doc(fb.db, 'users', path, 'sources', ssrc.id);
            const sSnap = await fs.getDoc(sRef);
            if(sSnap.exists()){
              const sd = sSnap.data();
              sources.push({ ...ssrc, text: sd.text || '', chunks: sd.chunks || [] });
            } else {
              sources.push({ ...ssrc, text: '', chunks: [] });
            }
          } catch(e){
            console.warn('Pull source failed', ssrc.id, e);
            sources.push({ ...ssrc, text: '', chunks: [] });
          }
        }
      }
      newNotebooks.push({ ...nb, sources });
    }
    state.notebooks = newNotebooks;
    state.results = data.results || [];
    state.chatHistory = data.chatHistory || {};
    save({ noSync: true });
    render();
  }

  function downloadSvgAsPng(svgEl, filename){
    try {
      const xml = new XMLSerializer().serializeToString(svgEl);
      const svgBlob = new Blob([xml], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(svgBlob);
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const scale = 2; // higher-res
        canvas.width = (svgEl.viewBox.baseVal.width || 1100) * scale;
        canvas.height = (svgEl.viewBox.baseVal.height || 720) * scale;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff8ec';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        canvas.toBlob((blob) => {
          const dlUrl = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = dlUrl;
          a.download = filename;
          a.click();
          setTimeout(() => URL.revokeObjectURL(dlUrl), 1000);
          toast('✓ Downloaded');
        });
        URL.revokeObjectURL(url);
      };
      img.onerror = () => { URL.revokeObjectURL(url); toast('❌ Download failed'); };
      img.src = url;
    } catch(e){
      toast('❌ ' + e.message);
    }
  }

        if(mode === 'replace'){

  // ===== Source chunking (for citation grounding) =====
  // Larger chunks (~1800 chars) give the AI enough context per chunk to make
  // citations meaningful. Junk chunks (TOC, copyright pages, page numbers) are filtered out.
  function isJunkChunk(text){
    const t = text.trim();
    if(t.length < 300) return true;
    // Mostly numbers/page refs (TOC pages)
    const digitRatio = (t.match(/\d/g) || []).length / t.length;
    if(digitRatio > 0.18) return true;
    // Copyright / publisher boilerplate
    if(/©|all rights reserved|no part of this publication|isbn[ -]?\d|first intuition ltd|copyright \d{4}/i.test(t) && t.length < 1200) return true;
    // Table of contents (mostly short lines with page numbers)
    const lines = t.split(/\s{2,}|\n/);
    const tocLike = lines.filter(l => /\d+\s*$/.test(l.trim()) && l.trim().length < 80).length;
    if(tocLike > 10 && tocLike / lines.length > 0.5) return true;
    return false;
  }

  function chunkText(text, chunkSize = 1800){
    // Normalize whitespace and remove obviously broken character spacing like "C o u r s e"
    text = text.replace(/\r\n/g, '\n').replace(/\u00a0/g, ' ');
    // Collapse runs of 3+ spaces
    text = text.replace(/ {3,}/g, '  ');
    const chunks = [];
    // Try splitting by paragraphs first
    const paragraphs = text.split(/\n\s*\n/).filter(p => p.trim().length > 20);
    let current = '';
    for(const p of paragraphs){
      const candidate = current ? current + '\n\n' + p : p;
      if(candidate.length > chunkSize && current.length > 600){
        chunks.push(current.trim());
        current = p;
      } else {
        current = candidate;
      }
    }
    if(current.trim()) chunks.push(current.trim());
    // Fallback: hard split if paragraph-splitting didn't produce enough
    if(chunks.length === 0){
      for(let i = 0; i < text.length; i += chunkSize){
        chunks.push(text.substring(i, i + chunkSize));
      }
    }
    // Filter out junk chunks (TOC, copyright, page numbers)
    const cleaned = chunks.filter(c => !isJunkChunk(c));
    return cleaned.length > 0 ? cleaned : chunks; // never return empty
  }

  // ===== PDF =====
  async function extractPDF(file){
    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({data: buf}).promise;
    let text = '';
    for(let i = 1; i <= pdf.numPages; i++){
      const page = await pdf.getPage(i);
      const tc = await page.getTextContent();
      text += tc.items.map(it => it.str).join(' ') + '\n\n';
    }
    return { text, pageCount: pdf.numPages };
  }

  // ===== Web fetch via proxy =====
  async function fetchURL(url){
    // Try jina.ai reader first (clean markdown)
    try {
      const r = await fetch('https://r.jina.ai/' + url, { headers: { 'Accept': 'text/plain' } });
      if(r.ok){
        const text = await r.text();
        if(text.length > 100) return text;
      }
    } catch(e){ /* fallthrough */ }
    // Fallback: corsproxy.io + strip HTML
    try {
      const r = await fetch('https://corsproxy.io/?' + encodeURIComponent(url));
      if(r.ok){
        const html = await r.text();
        const div = document.createElement('div');
        div.innerHTML = html;
        // remove scripts, styles, nav
        div.querySelectorAll('script,style,nav,header,footer,aside').forEach(el => el.remove());
        const text = div.textContent.replace(/\s+/g, ' ').trim();
        if(text.length > 100) return text;
      }
    } catch(e){ /* fallthrough */ }
    throw new Error('Could not fetch the URL. The site may block automated access.');
  }

  // ===== Gemini API =====
  // Robust JSON repair, fixes common LLM mistakes
  function repairJSON(text){
    if(!text) return text;
    let s = text.trim();
    // Strip markdown code fences
    s = s.replace(/^```(?:json)?\s*/i, '').replace(/\s*```$/i, '');
    // Find the outermost JSON object/array
    const firstBrace = s.search(/[\{\[]/);
    const lastBrace = Math.max(s.lastIndexOf('}'), s.lastIndexOf(']'));
    if(firstBrace !== -1 && lastBrace > firstBrace) s = s.substring(firstBrace, lastBrace + 1);
    // Remove trailing commas before } or ]
    s = s.replace(/,(\s*[}\]])/g, '$1');
    // Add missing commas between adjacent objects/arrays in arrays:
    // "}\n{" -> "},\n{"  and "]\n[" -> "],\n[" and "}\n[" / "]\n{"
    s = s.replace(/([}\]])(\s*\n\s*)([{\[])/g, '$1,$2$3');
    // Add missing commas between adjacent string values and next key:
    // '"foo"\n  "bar":' -> '"foo",\n  "bar":'
    s = s.replace(/("(?:[^"\\]|\\.)*")(\s*\n\s*)("[^"]+"\s*:)/g, '$1,$2$3');
    // Same for numbers/booleans followed by next key
    s = s.replace(/(\d|true|false|null)(\s*\n\s*)("[^"]+"\s*:)/g, '$1,$2$3');
    // Convert smart quotes
    s = s.replace(/[\u2018\u2019]/g, "'").replace(/[\u201C\u201D]/g, '"');
    return s;
  }

  // Attempt incremental truncation if JSON is partially broken
  function tryParseProgressive(text){
    // Try as-is
    try { return JSON.parse(text); } catch(e){}
    // Try with repair
    const repaired = repairJSON(text);
    try { return JSON.parse(repaired); } catch(e){}
    // Try chopping from the end (incomplete trailing object in an array)
    let s = repaired;
    for(let i = 0; i < 50; i++){
      // Find last complete }, before a comma or ], and chop there
      const lastValidEnd = Math.max(s.lastIndexOf('},'), s.lastIndexOf('}]'), s.lastIndexOf('}}'));
      if(lastValidEnd < 0) break;
      s = s.substring(0, lastValidEnd + 1);
      // close arrays/objects we may have opened
      const opens = (s.match(/[\[\{]/g) || []).length;
      const closes = (s.match(/[\]\}]/g) || []).length;
      let candidate = s;
      for(let k = 0; k < opens - closes; k++){
        // Guess which to close based on context
        const lastOpenArr = candidate.lastIndexOf('[');
        const lastOpenObj = candidate.lastIndexOf('{');
        candidate += lastOpenArr > lastOpenObj ? ']' : '}';
      }
      try { return JSON.parse(candidate); } catch(e){}
      // chop one more char and retry
      s = s.substring(0, lastValidEnd);
    }
    return null;
  }

  async function callGeminiRaw(prompt, asJSON, retryNote = ''){
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${state.apiKey}`;
    const fullPrompt = retryNote ? `${prompt}\n\nCRITICAL: ${retryNote}` : prompt;
    const body = {
      contents: [{ parts: [{ text: fullPrompt }] }],
      generationConfig: {
        temperature: 0.4,
        maxOutputTokens: 16000,
        ...(asJSON ? { responseMimeType: 'application/json' } : {}),
      },
    };
    const res = await fetch(url, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body),
    });
    if(!res.ok){
      const err = await res.text();
      throw new Error(`API ${res.status}: ${err.substring(0, 180)}`);
    }
    const data = await res.json();
    const text = data?.candidates?.[0]?.content?.parts?.[0]?.text || '';
    const finish = data?.candidates?.[0]?.finishReason;
    return { text, finish };
  }

  async function callGemini(prompt, asJSON = true){
    if(!state.apiKey) throw new Error('Add your Gemini API key first (sidebar).');

    // First attempt
    let { text, finish } = await callGeminiRaw(prompt, asJSON);
    if(!asJSON) return text;

    // Try to parse
    let parsed = tryParseProgressive(text);
    if(parsed) return parsed;

    // If hit token limit, partial JSON, recovery attempt
    if(finish === 'MAX_TOKENS'){
      // Try one more time asking for fewer items
      console.warn('Response truncated, retrying smaller...');
    }

    // Retry once with stricter prompt
    try {
      console.warn('JSON parse failed, retrying with stricter prompt');
      const retry = await callGeminiRaw(prompt, asJSON, 'Return PERFECT valid JSON. No trailing commas. No markdown fences. No comments. All strings properly quoted with " (not \'). All array items separated by commas. Test your output mentally before returning.');
      parsed = tryParseProgressive(retry.text);
      if(parsed) return parsed;
    } catch(e){
      console.warn('Retry failed', e);
    }

    // Last resort: give a helpful error
    throw new Error('AI returned malformed data. Tap to retry, usually works on second try.');
  }

  // ===== Build grounded context for a notebook (with citation tags) =====
  function buildGroundedContext(notebook, selectedSourceIds = null, maxChars = 80000){
    const sources = notebook.sources.filter(s => !selectedSourceIds || selectedSourceIds.has(s.id));
    let totalChunks = 0;
    sources.forEach(s => totalChunks += s.chunks.length);
    const budget = Math.max(maxChars, 40000);
    const targetCharsPerChunk = Math.max(800, Math.floor(budget / Math.max(totalChunks, 1)));
    let out = '';
    sources.forEach((src) => {
      const sNum = notebook.sources.indexOf(src) + 1;
      out += `\n\n========== SOURCE ${sNum}: ${src.name} ==========\n`;
      src.chunks.forEach((chunk, cIdx) => {
        const trimmed = chunk.length > targetCharsPerChunk
          ? chunk.substring(0, targetCharsPerChunk) + '...'
          : chunk;
        // Strong delimiters with cite-tag REPEATED at start and end so AI can anchor
        out += `\n<<< [S${sNum}:${cIdx+1}] >>>\n${trimmed}\n<<< END [S${sNum}:${cIdx+1}] >>>\n`;
      });
    });
    // Hard truncate if too long: instead of sampling random characters (which breaks chunk boundaries),
    // drop whole chunks from the middle of each source.
    if(out.length > maxChars){
      // Rebuild with reduced chunks per source
      out = '';
      const chunksPerSource = Math.max(3, Math.floor(maxChars / (sources.length * 1500)));
      sources.forEach((src) => {
        const sNum = notebook.sources.indexOf(src) + 1;
        out += `\n\n========== SOURCE ${sNum}: ${src.name} ==========\n`;
        // Take from start, middle, end
        const total = src.chunks.length;
        const indices = new Set();
        for(let i = 0; i < Math.min(chunksPerSource, total); i++){
          indices.add(Math.floor(i * total / chunksPerSource));
        }
        Array.from(indices).sort((a,b)=>a-b).forEach(cIdx => {
          const chunk = src.chunks[cIdx];
          const trimmed = chunk.length > 1200 ? chunk.substring(0, 1200) + '...' : chunk;
          out += `\n<<< [S${sNum}:${cIdx+1}] >>>\n${trimmed}\n<<< END [S${sNum}:${cIdx+1}] >>>\n`;
        });
      });
    }
    return out;
  }

  // ===== Chat =====
  async function askQuestion(notebook, question){
    const sources = notebook.sources.filter(s => !state.selectedSources || state.selectedSources.has(s.id));
    if(sources.length === 0) throw new Error('Select at least one source.');

    const context = buildGroundedContext(notebook, state.selectedSources);
    const history = state.chatHistory[notebook.id] || [];
    const recentHistory = history.slice(-6).map(m => `${m.role === 'user' ? 'USER' : 'ASSISTANT'}: ${m.content}`).join('\n\n');

    const prompt = `You are an expert tutor answering questions using ONLY the provided study sources. Never use outside knowledge.

HOW TO CITE (read carefully):
Each passage in the sources is wrapped like:
<<< [S1:3] >>>
...passage text...
<<< END [S1:3] >>>

The tag [S1:3] means Source 1, chunk 3. When you make a claim, the citation [S#:#] you write MUST match the EXACT tag of the passage that contains that information. Do NOT guess chunk numbers. Do NOT cite the first chunk by default. Scan the passages, find the one whose content actually supports your claim, then use that exact tag.

If multiple passages support the same claim, list both: [S1:3][S2:1].
If NO passage supports a claim, do NOT make that claim. Say "The sources don't cover this" instead.

SOURCES:

  async function suggestQuestions(notebook){

    const prompt = `Based on these study sources, generate exactly 4 insightful exam-prep questions a student would ask. Mix question types: one conceptual ("explain X"), one comparison ("how does X differ from Y"), one application ("when would you use X"), one analysis ("why does X matter").

Each question should be specific and substantive, drawn from the actual content. Avoid generic questions like "What is this about?".

Return JSON in this EXACT format:
{"questions": ["question 1", "question 2", "question 3", "question 4"]}

SOURCES:
${context}

Return ONLY valid JSON. No markdown fences, no preamble.`;
    const r = await callGemini(prompt, true);
    // Accept either {questions: [...]} or just [...]
    if(Array.isArray(r)) return r.slice(0, 4);
    if(r && Array.isArray(r.questions)) return r.questions.slice(0, 4);
    return [];
  }

FORMATTING RULES:
- Use ## for section headings (no emoji prefixes)
- Use **bold** ONLY for key terms or names. Do not bold whole sentences.
- Use bullet points (- ) for lists

- Each bullet is 1-2 complete sentences with the citation at the end
- Avoid em dashes (—), use commas or new sentences

STRUCTURE:
## Overview
A 2-3 sentence introduction to what these sources cover. Plain prose paragraph with one citation at the end.

## Key Themes
Three to five bullet points, one major theme each. Citation at end of each bullet.

## Important Concepts
Five to eight bullet points. Each names a concept in **bold**, then a one-sentence explanation, then the citation.

## Critical Takeaways
Three to four bullet points of the most important "exam-ready" insights.

SOURCES:
${context}

Return only the markdown briefing.`;

FORMATTING RULES:

  // Render a single chat message with citation parsing
  function renderMessage(msg, notebook){
    if(msg.role === 'user'){
      return `<div class="msg user">${escapeHTML(msg.content)}</div>`;
    }
    // assistant - parse markdown + citations
    let html = msg.content;
    // Strip em dashes Gemini may still produce, replace with commas/periods contextually
    html = html.replace(/\s*—\s*/g, ', ').replace(/\s*–\s*/g, ', ');
    // Escape HTML first (but preserve markdown formatting)
    html = html
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/\*([^*]+)\*/g, '<em>$1</em>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/^### (.+)$/gm, '<h3 style="font-family:Fraunces,serif;font-size:17px;font-weight:700;margin:10px 0 6px">$1</h3>')
      .replace(/^## (.+)$/gm, '<h2 style="font-family:Fraunces,serif;font-size:19px;font-weight:700;margin:12px 0 6px">$1</h2>')
      .replace(/^- (.+)$/gm, '• $1')
      .replace(/\n\n/g, '<br><br>')
      .replace(/\n/g, '<br>');
    // Replace citations [S1:3] with pills
    html = html.replace(/\[S(\d+):(\d+)\]/g, (m, s, c) => {
      return `<span class="citation-pill" data-action="show-cite" data-source="${s}" data-chunk="${c}">[${s}.${c}]</span>`;
    });
    return `<div class="msg assistant">${html}</div>`;
  }

  function renderMarkdownWithCitations(text){
    if(!text) return '';
    // Strip em dashes
    text = text.replace(/\s*—\s*/g, ', ').replace(/\s*–\s*/g, ', ');
    let html = text
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/\*([^*]+)\*/g, '<em>$1</em>')
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^# (.+)$/gm, '<h2>$1</h2>');
    // Lists
    html = html.replace(/(?:^[-*] .+(?:\n|$))+/gm, (m) => {
      const items = m.trim().split(/\n/).map(l => l.replace(/^[-*] /, '')).map(t => `<li>${t}</li>`).join('');
      return `<ul>${items}</ul>`;
    });
    // numbered lists
    html = html.replace(/(?:^\d+\. .+(?:\n|$))+/gm, (m) => {
      const items = m.trim().split(/\n/).map(l => l.replace(/^\d+\. /, '')).map(t => `<li>${t}</li>`).join('');
      return `<ol>${items}</ol>`;
    });
    // paragraphs
    html = html.split(/\n\n+/).map(p => {
      if(p.match(/^<(h[123]|ul|ol)/)) return p;
      return p.trim() ? `<p>${p.replace(/\n/g,'<br>')}</p>` : '';
    }).join('');
    // citations
    html = html.replace(/\[S(\d+):(\d+)\]/g, (m, s, c) =>
      `<span class="citation-pill" data-action="show-cite" data-source="${s}" data-chunk="${c}">[${s}.${c}]</span>`);
    return html;
  }

  // ===== Citation popup =====
  function renderCitePopup(){
    if(!state.citePopup) return '';
    const { sourceNum, chunkIdx } = state.citePopup;
    const nb = state.activeNotebook;
    if(!nb) return '';
    const src = nb.sources[sourceNum - 1];
    if(!src) return `
      <div class="modal-backdrop" data-action="close-cite">
        <div class="cite-popup" onclick="event.stopPropagation()">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">

          <div style="padding:14px;background:#fff8ec;border:2px solid var(--ink);border-radius:10px;font-size:13px">The AI referenced a source that isn't in this notebook. Try regenerating, or check that the right sources are selected.</div>
        </div>
      </div>`;

    let chunk = src.chunks[chunkIdx - 1];
    let actualIdx = chunkIdx;
    let outOfRange = false;
    if(!chunk){
      outOfRange = true;
      // Show the closest available chunk instead
      if(src.chunks.length > 0){
        actualIdx = Math.max(1, Math.min(src.chunks.length, chunkIdx));
        chunk = src.chunks[actualIdx - 1];
      }
    }
    if(!chunk) chunk = '(empty)';

    return `
      <div class="modal-backdrop" data-action="close-cite">
        <div class="cite-popup" onclick="event.stopPropagation()">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:10px">
            <div style="flex:1;min-width:0">
              <div class="label">SOURCE ${sourceNum} · PASSAGE ${actualIdx}${outOfRange?` (closest to ${chunkIdx})`:''} OF ${src.chunks.length}</div>

            </div>
            <button class="btn btn-ghost btn-sm" data-action="close-cite" style="flex-shrink:0">✕</button>

          ${outOfRange ? `<div style="font-size:12px;background:#fff8ec;border:2px dashed var(--ink);padding:8px 12px;border-radius:8px;margin-bottom:10px">⚠️ The AI cited passage ${chunkIdx} but this source only has ${src.chunks.length} passages. Showing closest match.</div>` : ''}
          <div class="passage">${escapeHTML(chunk)}</div>
          <div style="display:flex;gap:8px;margin-top:12px;justify-content:space-between">
            <button class="btn btn-sm btn-ghost" data-action="cite-prev" ${actualIdx<=1?'disabled':''}>← Prev passage</button>
            <button class="btn btn-sm btn-ghost" data-action="cite-next" ${actualIdx>=src.chunks.length?'disabled':''}>Next passage →</button>
          </div>
        </div>
      </div>`;
  }

  function renderMindmap(){
    const mm = state.currentMindmap;
    const branchCount = mm.branches.length;
    // Auto-switch to list on mobile (but respect explicit user choice if they toggled)
    const isMobile = window.innerWidth < 700;
    const viewMode = state.mindmapView === 'list' ? 'list' :
                     state.mindmapView === 'radial' ? 'radial' :
                     (isMobile ? 'list' : 'radial');

    // Build radial SVG
    const colors = ['#ff5b8a','#2dd4bf','#b8e62e','#ffd23f','#8b5cf6','#ff7a3d','#ec4899'];
    const W = 1200, H = 820;
    const cx = W / 2, cy = H / 2;
    const centerRadius = 100;
    const branchRadius = 340;
    const boxW = 220;

    // Layout: distribute branches in circle
    const branches = mm.branches.map((b, i) => {
      const angle = (i / branchCount) * 2 * Math.PI - Math.PI / 2;
      const x = cx + Math.cos(angle) * branchRadius;
      const y = cy + Math.sin(angle) * branchRadius;
      const color = colors[i % colors.length];
      const boxH = 56 + Math.min(b.points.length, 5) * 22;

      // Anchor box so it doesn't cross center, and stays in canvas
      let anchorX, anchorY;
      const cos = Math.cos(angle), sin = Math.sin(angle);
      // Horizontal positioning based on which side
      if(cos > 0.3) anchorX = x;            // right side: box extends right
      else if(cos < -0.3) anchorX = x - boxW;  // left side: box extends left
      else anchorX = x - boxW / 2;             // top/bottom: centered
      // Vertical positioning
      anchorY = y - boxH / 2;
      // Clamp to canvas with padding
      anchorX = Math.max(20, Math.min(W - boxW - 20, anchorX));
      anchorY = Math.max(20, Math.min(H - boxH - 20, anchorY));

      // Box center for connecting line
      const boxCenterX = anchorX + boxW / 2;
      const boxCenterY = anchorY + boxH / 2;

      // Pick connection point on box edge facing center
      let connX, connY;
      const dx = cx - boxCenterX, dy = cy - boxCenterY;
      if(Math.abs(dx) * boxH > Math.abs(dy) * boxW){
        // Horizontal edge dominant
        connX = dx > 0 ? anchorX : anchorX + boxW;
        connY = boxCenterY;
      } else {
        // Vertical edge dominant
        connX = boxCenterX;
        connY = dy > 0 ? anchorY : anchorY + boxH;
      }

      // Center connection point on circle edge
      const centerEdgeX = cx + Math.cos(angle) * centerRadius;
      const centerEdgeY = cy + Math.sin(angle) * centerRadius;

      // Smooth curved path (quadratic bezier)
      const midX = (centerEdgeX + connX) / 2;
      const midY = (centerEdgeY + connY) / 2;
      // Add slight curve based on angle
      const curveOffset = 30 * Math.sin(angle * 2);
      const controlX = midX - sin * curveOffset;
      const controlY = midY + cos * curveOffset;
      const path = `M ${centerEdgeX} ${centerEdgeY} Q ${controlX} ${controlY} ${connX} ${connY}`;

      return { ...b, color, anchorX, anchorY, boxH, path };
    });

    const radialSvg = `
      <svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block;font-family:'Outfit',sans-serif">
        <!-- Dotted background -->
        <defs>
          <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
            <circle cx="10" cy="10" r="1" fill="#1a1530" opacity="0.08"/>
          </pattern>
        </defs>
        <rect width="${W}" height="${H}" fill="url(#dots)"/>

        <!-- Connection paths (drawn first, behind boxes) -->
        ${branches.map(b => `
          <path d="${b.path}" stroke="${b.color}" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.9"/>
          <path d="${b.path}" stroke="#1a1530" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.3"/>
        `).join('')}

        <!-- Branch boxes -->
        ${branches.map(b => `
          <g transform="translate(${b.anchorX},${b.anchorY})">
            <rect x="4" y="4" width="${boxW}" height="${b.boxH}" rx="14" ry="14" fill="#1a1530" opacity="0.2"/>
            <rect x="0" y="0" width="${boxW}" height="${b.boxH}" rx="14" ry="14" fill="${b.color}" stroke="#1a1530" stroke-width="3"/>
            <text x="14" y="26" font-size="15" font-weight="700" fill="#1a1530" font-family="Fraunces, serif">${escapeHTML(b.title.substring(0, 30))}</text>
            <line x1="14" y1="34" x2="${boxW - 14}" y2="34" stroke="#1a1530" stroke-width="1.5" stroke-dasharray="2,3" opacity="0.4"/>
            ${b.points.slice(0, 5).map((p, j) => `
              <text x="14" y="${52 + j * 22}" font-size="12" fill="#1a1530" font-weight="500">${escapeHTML('• ' + p.substring(0, 36) + (p.length > 36 ? '…' : ''))}</text>
            `).join('')}
          </g>
        `).join('')}

        <!-- Center circle -->
        <circle cx="${cx}" cy="${cy}" r="${centerRadius + 6}" fill="none" stroke="#ffd23f" stroke-width="2" stroke-dasharray="5,5"/>
        <circle cx="${cx}" cy="${cy}" r="${centerRadius}" fill="#1a1530" stroke="#1a1530" stroke-width="3"/>
        ${wrapSvgText(mm.central, cx, cy, centerRadius - 18, 17)}
      </svg>
    `;

    const listView = `
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px">
        ${mm.branches.map((b, i) => {
          const color = colors[i % colors.length];
          return `
            <div style="border:3px solid var(--ink);border-radius:18px;background:${color};padding:18px;box-shadow:var(--shadow-sm)">
              <h3 style="font-family:'Fraunces',serif;font-size:18px;margin-bottom:10px">${escapeHTML(b.title)}</h3>
              <ul style="list-style:none;padding:0">
                ${b.points.map(p => `<li style="padding:8px 0;border-top:2px dashed rgba(26,21,48,.25);font-size:14px;line-height:1.4;font-weight:500">• ${escapeHTML(p)}</li>`).join('')}
              </ul>
            </div>
          `;
        }).join('')}
      </div>`;

    return `
      <div class="main">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap">
          <button class="btn btn-sm btn-ghost" data-action="mind-exit">← Back</button>

  // Helper: split text into lines that fit within a width, render as tspan
  function wrapSvgText(text, cx, cy, maxWidth, fontSize){
    const words = text.split(/\s+/);
    const lines = [];
    let current = '';
    const charWidth = fontSize * 0.55;
    const maxChars = Math.floor((maxWidth * 2) / charWidth);
    for(const w of words){
      const candidate = current ? current + ' ' + w : w;
      if(candidate.length > maxChars && current){
        lines.push(current);
        current = w;
      } else {
        current = candidate;
      }
    }
    if(current) lines.push(current);
    const total = lines.length;
    const startY = cy - ((total - 1) * fontSize * 0.6);
    return `<text x="${cx}" y="${startY}" font-size="${fontSize}" fill="#ffd23f" font-weight="800" font-family="Fraunces, serif" text-anchor="middle" dominant-baseline="middle">
      ${lines.map((l, i) => `<tspan x="${cx}" dy="${i === 0 ? 0 : fontSize * 1.2}">${escapeHTML(l)}</tspan>`).join('')}
    </text>`;
  }
