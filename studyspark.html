<title>StudySpark — AI Notebooks</title>

<!-- PWA -->
<meta name="theme-color" content="#1a1530">
<meta name="apple-mobile-web-app-capable" content="yes">

<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,800;9..144,900&family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

<script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
<style>
  :root{
    --bg:#fff8ec; --ink:#1a1530; --paper:#fff;
    --pink:#ff5b8a; --tangerine:#ff7a3d; --sun:#ffd23f;
    --lime:#b8e62e; --teal:#2dd4bf; --grape:#8b5cf6;
    --shadow:6px 6px 0 var(--ink); --shadow-sm:3px 3px 0 var(--ink); --shadow-lg:10px 10px 0 var(--ink);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Outfit',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden;
    background-image:radial-gradient(circle at 20% 10%,rgba(255,91,138,.12) 0,transparent 40%),radial-gradient(circle at 80% 80%,rgba(45,212,191,.12) 0,transparent 40%),radial-gradient(circle at 50% 50%,rgba(255,210,63,.08) 0,transparent 60%);
  }
  body::before{content:"";position:fixed;inset:0;background-image:radial-gradient(circle,rgba(26,21,48,.06) 1px,transparent 1px);background-size:22px 22px;pointer-events:none;z-index:0}
  h1,h2,h3,h4{font-family:'Fraunces',serif;font-weight:800;letter-spacing:-0.02em;line-height:1.05}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit}

  .app{display:flex;min-height:100vh;position:relative;z-index:1}
  .sidebar{width:260px;flex-shrink:0;background:var(--ink);color:#fff8ec;padding:28px 20px;display:flex;flex-direction:column;gap:8px;position:sticky;top:0;height:100vh;border-right:3px solid var(--ink)}
  .logo{font-family:'Fraunces',serif;font-weight:900;font-size:28px;color:var(--sun);letter-spacing:-0.03em;margin-bottom:24px;display:flex;align-items:center;gap:8px}
  .logo .dot{display:inline-block;width:14px;height:14px;border-radius:50%;background:var(--pink);box-shadow:3px 3px 0 var(--sun);transform:translateY(-4px)}
  .nav-item{text-align:left;padding:12px 14px;border-radius:12px;font-weight:600;font-size:15px;color:#fff8ec;opacity:.7;transition:all .15s ease;display:flex;align-items:center;gap:10px;border:2px solid transparent}
  .nav-item:hover{opacity:1;background:rgba(255,255,255,.06)}
  .nav-item.active{background:var(--sun);color:var(--ink);opacity:1;border-color:var(--ink);box-shadow:3px 3px 0 var(--pink);transform:translate(-2px,-2px)}
  .nav-icon{font-size:18px}
  .api-status{margin-top:auto;padding:14px;border-radius:14px;background:rgba(255,255,255,.06);font-size:13px;border:2px dashed rgba(255,248,236,.2)}
  .api-status .label{opacity:.6;margin-bottom:6px;font-size:11px;text-transform:uppercase;letter-spacing:.1em}
  .api-status .value{font-weight:600}
  .api-status.ok .value{color:var(--lime)}
  .api-status.no .value{color:var(--pink)}

  .main{flex:1;padding:36px 44px 80px;max-width:1500px;overflow-x:hidden;width:100%}
  .page-title{font-size:48px;margin-bottom:6px}
  .page-sub{color:rgba(26,21,48,.6);font-size:17px;margin-bottom:32px;font-weight:500}

  .card{background:var(--paper);border:3px solid var(--ink);border-radius:20px;box-shadow:var(--shadow);padding:24px}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:12px 20px;border:3px solid var(--ink);border-radius:14px;font-weight:700;font-size:15px;background:var(--sun);box-shadow:var(--shadow-sm);transition:all .12s ease}
  .btn:hover{transform:translate(-2px,-2px);box-shadow:5px 5px 0 var(--ink)}
  .btn:active{transform:translate(2px,2px);box-shadow:none}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn-pink{background:var(--pink);color:#fff}
  .btn-teal{background:var(--teal)}
  .btn-lime{background:var(--lime)}
  .btn-grape{background:var(--grape);color:#fff}
  .btn-ghost{background:transparent;box-shadow:none}
  .btn-ghost:hover{background:rgba(26,21,48,.05);box-shadow:none;transform:none}
  .btn-sm{padding:8px 14px;font-size:13px;box-shadow:2px 2px 0 var(--ink)}

  .pill{display:inline-block;padding:4px 12px;border-radius:999px;background:var(--ink);color:#fff8ec;font-size:12px;font-weight:600;letter-spacing:.04em}
  .pill-sun{background:var(--sun);color:var(--ink)}
  .pill-pink{background:var(--pink);color:#fff}
  .pill-teal{background:var(--teal);color:var(--ink)}
  .pill-lime{background:var(--lime);color:var(--ink)}

  /* Stats */
  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:32px}
  .stat{padding:22px;border-radius:20px;border:3px solid var(--ink);box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
  .stat:nth-child(1){background:var(--pink);color:#fff}
  .stat:nth-child(2){background:var(--sun)}
  .stat:nth-child(3){background:var(--teal)}
  .stat:nth-child(4){background:var(--lime)}
  .stat .num{font-family:'Fraunces',serif;font-weight:900;font-size:48px;line-height:1}
  .stat .lbl{font-weight:600;font-size:14px;margin-top:8px;opacity:.85}
  .stat .decoration{position:absolute;right:-10px;bottom:-10px;font-size:60px;opacity:.2;transform:rotate(-10deg)}

  .section-title{font-size:28px;margin:32px 0 16px;display:flex;align-items:center;gap:12px}
  .section-title::after{content:"";flex:1;height:3px;background:var(--ink);border-radius:3px;max-width:200px;opacity:.15}

  /* Notebook grid */
  .nb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
  .nb-card{background:var(--paper);border:3px solid var(--ink);border-radius:20px;padding:22px;box-shadow:var(--shadow-sm);transition:all .15s ease;cursor:pointer;position:relative;overflow:hidden;text-align:left}
  .nb-card:hover{transform:translate(-3px,-3px) rotate(-.5deg);box-shadow:var(--shadow)}
  .nb-card .emoji{font-size:42px;margin-bottom:10px}
  .nb-card h3{font-size:22px;margin-bottom:6px;line-height:1.2}
  .nb-card .meta{font-size:13px;color:rgba(26,21,48,.55);font-weight:500;margin-bottom:14px}
  .nb-card .nb-stats{display:flex;gap:6px;flex-wrap:wrap}

  .nb-new{background:var(--sun);border-style:dashed;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:200px;font-weight:700}
  .nb-new:hover{background:#fff8ec}
  .nb-new .big{font-size:48px;margin-bottom:8px}

  /* Notebook layout (3-column) */
  .nb-layout{display:grid;grid-template-columns:300px 1fr 320px;gap:20px;min-height:calc(100vh - 100px)}
  .nb-panel{background:var(--paper);border:3px solid var(--ink);border-radius:20px;padding:18px;box-shadow:var(--shadow-sm);overflow-y:auto;max-height:calc(100vh - 80px)}
  .nb-panel h3{font-size:18px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:8px}
  .nb-panel h3 .ico{font-size:22px}

  .source-item{padding:12px;border:2px solid var(--ink);border-radius:12px;margin-bottom:10px;background:#fff;font-size:13px;display:flex;gap:10px;align-items:flex-start;cursor:pointer;transition:all .12s}
  .source-item:hover{background:var(--sun)}
  .source-item.selected{background:var(--sun);box-shadow:2px 2px 0 var(--ink);transform:translate(-1px,-1px)}
  .source-item .src-ico{font-size:20px;flex-shrink:0}
  .source-item .src-body{flex:1;min-width:0}
  .source-item .src-title{font-weight:600;word-break:break-word;line-height:1.3}
  .source-item .src-meta{font-size:11px;color:rgba(26,21,48,.55);margin-top:3px}
  .source-item .src-del{font-size:14px;opacity:.4;cursor:pointer;flex-shrink:0}
  .source-item .src-del:hover{opacity:1;color:var(--pink)}
  .source-num{display:inline-block;background:var(--ink);color:#fff8ec;font-family:'JetBrains Mono',monospace;font-size:11px;padding:2px 6px;border-radius:5px;font-weight:600;margin-right:6px}

  .add-source-btns{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
  .add-src-btn{padding:10px 14px;border:2px dashed var(--ink);border-radius:10px;background:#fff;font-weight:600;font-size:13px;text-align:left;display:flex;align-items:center;gap:8px;cursor:pointer;transition:all .12s}
  .add-src-btn:hover{background:var(--sun);border-style:solid}

  /* Chat */
  .chat-area{display:flex;flex-direction:column;height:100%}
  .chat-messages{flex:1;overflow-y:auto;padding:6px 4px 16px;display:flex;flex-direction:column;gap:14px;min-height:300px}
  .msg{padding:14px 18px;border-radius:18px;border:3px solid var(--ink);max-width:88%;line-height:1.55;font-size:15px;animation:slideUp .3s ease}
  @keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .msg.user{align-self:flex-end;background:var(--pink);color:#fff;border-bottom-right-radius:6px}
  .msg.assistant{align-self:flex-start;background:#fff;border-bottom-left-radius:6px;box-shadow:var(--shadow-sm)}
  .msg.assistant strong{font-weight:700;color:var(--ink)}
  .citation-pill{display:inline-block;background:var(--teal);color:var(--ink);padding:2px 8px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;margin:0 2px;cursor:pointer;border:2px solid var(--ink);transition:all .1s;vertical-align:1px}
  .citation-pill:hover{background:var(--sun);transform:translateY(-1px)}
  .msg.thinking{background:#fff;font-style:italic;opacity:.7}
  .msg.thinking::after{content:"●●●";letter-spacing:4px;animation:thinking 1.2s infinite}
  @keyframes thinking{0%,100%{opacity:.3}50%{opacity:1}}

  .chat-input-row{display:flex;gap:10px;align-items:flex-end;padding-top:14px;border-top:2px dashed rgba(26,21,48,.15)}
  .chat-input{flex:1;border:3px solid var(--ink);border-radius:14px;padding:12px 14px;font-size:15px;resize:none;font-family:inherit;background:#fff;font-weight:500;min-height:48px;max-height:120px}
  .chat-input:focus{outline:none;background:#fff8ec}
  .chat-empty{text-align:center;padding:40px 20px;color:rgba(26,21,48,.5)}
  .chat-empty .big{font-size:48px;margin-bottom:12px}
  .chat-empty h3{font-size:22px;margin-bottom:8px;color:var(--ink)}
  .suggested-q{margin-top:18px;display:flex;flex-direction:column;gap:8px;max-width:480px;margin-left:auto;margin-right:auto}
  .suggested-q button{padding:10px 16px;border:2px solid var(--ink);border-radius:12px;background:#fff;text-align:left;font-weight:500;font-size:14px;cursor:pointer;transition:all .12s}
  .suggested-q button:hover{background:var(--sun);transform:translate(-2px,-2px);box-shadow:3px 3px 0 var(--ink)}

  /* Studio panel */
  .studio-tile{padding:14px;border:2px solid var(--ink);border-radius:12px;margin-bottom:10px;background:#fff;cursor:pointer;transition:all .12s;text-align:left;width:100%;display:flex;align-items:center;gap:12px}
  .studio-tile:hover{transform:translate(-2px,-2px);box-shadow:3px 3px 0 var(--ink)}
  .studio-tile.has-content{background:var(--lime)}
  .studio-tile .st-ico{font-size:26px;flex-shrink:0}
  .studio-tile .st-body{flex:1;min-width:0}
  .studio-tile .st-title{font-weight:700;font-size:14px}
  .studio-tile .st-desc{font-size:11px;color:rgba(26,21,48,.6);margin-top:2px}

  /* Citation modal/popover */
  .cite-popup{position:fixed;background:var(--paper);border:3px solid var(--ink);border-radius:16px;padding:20px;box-shadow:var(--shadow);max-width:480px;max-height:60vh;overflow-y:auto;z-index:150}
  .cite-popup .label{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--pink);font-weight:700;letter-spacing:.1em;margin-bottom:8px}
  .cite-popup .source-name{font-family:'Fraunces',serif;font-weight:700;font-size:18px;margin-bottom:12px}
  .cite-popup .passage{font-size:14px;line-height:1.6;background:var(--sun);padding:14px;border-radius:10px;border:2px solid var(--ink)}

  /* Studio content viewer (large modal) */
  .studio-viewer{padding:0}
  .studio-viewer h2{font-size:32px;margin-bottom:8px}
  .studio-viewer .meta{font-size:13px;color:rgba(26,21,48,.6);margin-bottom:18px;font-weight:500}
  .studio-content{line-height:1.7;font-size:15px}
  .studio-content h2{font-family:'Fraunces',serif;font-size:24px;margin:20px 0 10px}
  .studio-content h3{font-family:'Fraunces',serif;font-size:18px;margin:16px 0 8px}
  .studio-content p{margin-bottom:12px}
  .studio-content ul,.studio-content ol{margin:8px 0 12px 22px}
  .studio-content li{margin-bottom:6px}
  .studio-content strong{font-weight:700}
  .studio-content .key-term{background:var(--sun);padding:1px 6px;border-radius:4px;font-weight:600;border:2px solid var(--ink)}
  .faq-item{border:2px solid var(--ink);border-radius:14px;margin-bottom:12px;background:#fff;overflow:hidden}
  .faq-q{padding:14px 16px;background:var(--teal);font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px}
  .faq-q::before{content:"❓";font-size:18px}
  .faq-a{padding:14px 16px;border-top:2px dashed var(--ink);font-size:14px;line-height:1.6}

  /* Upload zone */
  .upload-zone{border:3px dashed var(--ink);border-radius:18px;padding:32px 20px;text-align:center;background:#fff;cursor:pointer;transition:all .2s ease;font-size:14px}
  .upload-zone:hover{background:#fff8ec}
  .upload-zone.drag{background:var(--sun);border-style:solid}
  .upload-zone .ico{font-size:42px;margin-bottom:8px}

  /* Input field */
  .input,.select,.textarea{width:100%;padding:12px 14px;border:3px solid var(--ink);border-radius:12px;font-size:15px;background:#fff;font-weight:500}
  .input:focus,.select:focus,.textarea:focus{outline:none;background:var(--sun)}
  .textarea{resize:vertical;min-height:80px;font-family:inherit}
  .field{margin-bottom:18px}
  .field label{display:block;font-weight:600;font-size:14px;margin-bottom:8px}

  .chip-row{display:flex;flex-wrap:wrap;gap:8px}
  .chip{padding:8px 16px;border:3px solid var(--ink);border-radius:999px;background:#fff;font-weight:600;font-size:14px;cursor:pointer;transition:all .12s ease}
  .chip:hover{background:#fff8ec}
  .chip.active{background:var(--pink);color:#fff;box-shadow:2px 2px 0 var(--ink);transform:translate(-1px,-1px)}
  .chip-sun.active{background:var(--sun);color:var(--ink)}
  .chip-teal.active{background:var(--teal);color:var(--ink)}
  .number-pick{display:flex;gap:8px;align-items:center}
  .number-pick .chip{flex:1;text-align:center;padding:10px 0}

  /* Quiz player */
  .quiz-player{max-width:780px;margin:0 auto}
  .quiz-progress{display:flex;align-items:center;gap:14px;margin-bottom:24px}
  .quiz-progress .bar{flex:1;height:14px;background:#fff;border:3px solid var(--ink);border-radius:999px;overflow:hidden}
  .quiz-progress .fill{height:100%;background:var(--lime);border-right:3px solid var(--ink);transition:width .4s cubic-bezier(.34,1.56,.64,1)}
  .quiz-progress .count{font-weight:700;font-family:'JetBrains Mono',monospace;font-size:14px}
  .quiz-question{background:var(--paper);border:3px solid var(--ink);border-radius:24px;padding:34px;box-shadow:var(--shadow);margin-bottom:20px;animation:slideUp .4s ease}
  .q-num{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--pink);font-weight:600;margin-bottom:8px;letter-spacing:.1em}
  .q-text{font-family:'Fraunces',serif;font-size:26px;font-weight:700;line-height:1.3;margin-bottom:24px}
  .q-options{display:flex;flex-direction:column;gap:12px}
  .q-option{padding:18px 20px;border:3px solid var(--ink);border-radius:14px;background:#fff;cursor:pointer;text-align:left;font-size:16px;font-weight:500;display:flex;align-items:center;gap:14px;transition:all .15s ease;line-height:1.4}
  .q-option:hover{background:#fff8ec;transform:translate(-2px,-2px);box-shadow:3px 3px 0 var(--ink)}
  .q-option.selected{background:var(--sun);box-shadow:3px 3px 0 var(--ink);transform:translate(-2px,-2px)}
  .q-option.correct{background:var(--lime);box-shadow:3px 3px 0 var(--ink)}
  .q-option.incorrect{background:var(--pink);color:#fff;box-shadow:3px 3px 0 var(--ink)}
  .q-option .letter{width:34px;height:34px;border-radius:8px;background:var(--ink);color:#fff8ec;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;font-family:'JetBrains Mono',monospace}
  .q-option.correct .letter{background:#0a4d2c;color:var(--lime)}
  .q-option.incorrect .letter{background:#4a0a1d;color:var(--pink)}
  .explanation{margin-top:20px;padding:20px;border:3px solid var(--ink);border-radius:14px;background:var(--sun);animation:slideUp .3s ease}
  .explanation .label{font-weight:700;font-size:13px;letter-spacing:.1em;margin-bottom:8px;text-transform:uppercase}
  .explanation .text{font-size:15px;line-height:1.5;font-weight:500}
  .quiz-actions{display:flex;justify-content:space-between;gap:12px;margin-top:20px}
  .results{text-align:center;max-width:680px;margin:0 auto}
  .score-circle{width:220px;height:220px;border-radius:50%;background:var(--sun);border:5px solid var(--ink);display:flex;align-items:center;justify-content:center;flex-direction:column;margin:24px auto;box-shadow:var(--shadow-lg);position:relative}
  .score-circle::before{content:"";position:absolute;inset:-20px;border:3px dashed var(--ink);border-radius:50%;animation:spin 30s linear infinite}
  @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
  .score-num{font-family:'Fraunces',serif;font-weight:900;font-size:72px;line-height:1}
  .score-lbl{font-weight:600;font-size:14px;letter-spacing:.1em}

  /* Flashcards */
  .flashcard-stage{display:flex;flex-direction:column;align-items:center;gap:24px;padding:20px}
  .flashcard{width:100%;max-width:580px;height:340px;perspective:1500px;cursor:pointer}
  .flashcard-inner{position:relative;width:100%;height:100%;transition:transform .7s cubic-bezier(.34,1.56,.64,1);transform-style:preserve-3d}
  .flashcard.flipped .flashcard-inner{transform:rotateY(180deg)}
  .flashcard-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border:3px solid var(--ink);border-radius:24px;box-shadow:var(--shadow-lg);padding:36px;display:flex;align-items:center;justify-content:center;text-align:center;flex-direction:column}
  .flashcard-front{background:var(--paper)}
  .flashcard-back{background:var(--teal);transform:rotateY(180deg)}
  .flashcard-face .label{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.15em;opacity:.5;position:absolute;top:20px;left:24px}
  .flashcard-face .content{font-family:'Fraunces',serif;font-size:24px;font-weight:700;line-height:1.3}
  .flashcard-back .content{font-family:'Outfit',sans-serif;font-size:18px;font-weight:500;line-height:1.5}

  /* Modal */

  /* Toast */

  @keyframes toastIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

  .empty .ico{font-size:64px;margin-bottom:16px;opacity:.5}

  /* Mobile */

    .nb-layout{grid-template-columns:1fr;gap:14px}

  }

    .sidebar .logo span:not(.dot){display:none}

    .main{padding:20px 18px 60px}
    .page-title{font-size:32px}
    .page-sub{font-size:14px}
    .stat .num{font-size:36px}
  }
</style>
</head>
<body>
<div id="app" class="app"></div>
<script type="module">
  // ===== State =====
  const state = {
    page: 'home',
    apiKey: localStorage.getItem('ss_api_key') || '',
    notebooks: JSON.parse(localStorage.getItem('ss_notebooks') || '[]'),
    results: JSON.parse(localStorage.getItem('ss_results') || '[]'),
    activeNotebook: null,
    selectedSources: null, // Set of source IDs selected for chat/study aids (null = all)
    chatHistory: {}, // notebookId -> [{role, content, citations}]
    currentQuiz: null,
    quizState: null,
    quizConfig: { count: 10, difficulty: 'medium', types: ['mcq'], focus: '' },
    currentFlashcards: null,
    flashState: null,
    currentMindmap: null,
    studioView: null, // { type: 'summary'|'studyguide'|'faq', content, notebookId }
    modal: null,
    toast: null,
    citePopup: null, // {x, y, sourceNum, chunkIdx}
    loading: null,
  };

  const NOTEBOOK_EMOJIS = ['📘','📗','📙','📕','📓','📔','📒','🗒️','📚','🎓','🧪','⚗️','🔬','🌐','💼','⚖️','🧮','🎨'];

  function save(){
    localStorage.setItem('ss_notebooks', JSON.stringify(state.notebooks));
    localStorage.setItem('ss_results', JSON.stringify(state.results));
  }

  const $ = (id) => document.getElementById(id);
  const root = $('app');

  // ===== Passcode gate =====
  async function sha256(str){
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  const LOCK = {
    storedHash: () => localStorage.getItem('ss_pass_hash'),
    sessionOK: () => sessionStorage.getItem('ss_unlocked') === '1',
    failures: () => parseInt(localStorage.getItem('ss_fails') || '0'),
    lockedUntil: () => parseInt(localStorage.getItem('ss_locked_until') || '0'),
  };

  function lockScreen(mode){
    const locked = LOCK.lockedUntil() > Date.now();
    const waitMin = locked ? Math.ceil((LOCK.lockedUntil() - Date.now()) / 60000) : 0;
    document.body.innerHTML = `
      <style>
        body{display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Outfit',sans-serif;background:var(--bg);padding:20px}
        .lock-card{background:#fff;border:3px solid var(--ink);border-radius:24px;box-shadow:10px 10px 0 var(--ink);padding:36px;max-width:420px;width:100%;text-align:center}
        .lock-card .ico{font-size:64px;margin-bottom:12px}
        .lock-card h1{font-family:'Fraunces',serif;font-size:36px;margin-bottom:8px;font-weight:800;letter-spacing:-0.02em}
        .lock-card p{color:rgba(26,21,48,.65);font-weight:500;margin-bottom:24px;line-height:1.5}
        .lock-card input{width:100%;padding:16px;border:3px solid var(--ink);border-radius:14px;font-size:20px;font-weight:600;text-align:center;letter-spacing:.2em;font-family:'JetBrains Mono',monospace;margin-bottom:14px}
        .lock-card input:focus{outline:none;background:var(--sun)}
        .lock-btn{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border:3px solid var(--ink);border-radius:14px;font-weight:700;font-size:16px;background:var(--pink);color:#fff;box-shadow:3px 3px 0 var(--ink);cursor:pointer;font-family:inherit;width:100%;justify-content:center;transition:all .12s}
        .lock-btn:hover{transform:translate(-2px,-2px);box-shadow:5px 5px 0 var(--ink)}
        .lock-err{color:#c0264f;font-weight:600;font-size:14px;margin-top:8px;min-height:20px}
        .lock-hint{font-size:12px;color:rgba(26,21,48,.5);margin-top:18px;line-height:1.5}
      </style>
      <div class="lock-card">
        <div class="ico">${locked?'⏳':mode==='setup'?'🔐':'🔒'}</div>
        <h1>${locked?'Locked out':mode==='setup'?'Set a passcode':'StudySpark'}</h1>
        <p>${locked?`Too many wrong tries. Try again in ${waitMin} min.`:mode==='setup'?'Choose a 4–8 digit code. You\'ll enter it once per device.':'Enter your passcode to continue.'}</p>
        ${!locked?`<input id="lock-input" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="8" placeholder="••••" autocomplete="off" autofocus>
          ${mode==='setup'?`<input id="lock-input-2" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="8" placeholder="Confirm" autocomplete="off">`:''}
          <button class="lock-btn" id="lock-go">${mode==='setup'?'✨ Set passcode':'🔓 Unlock'}</button>
          <div class="lock-err" id="lock-err"></div>
          <div class="lock-hint">${mode==='unlock'?'Forgot? Clear site data in your browser to reset.':'Hashed locally, never sent anywhere.'}</div>`:''}
      </div>`;
    if(locked) return;
    const go = async () => {
      const v = $('lock-input').value.trim();
      const err = $('lock-err');
      if(!v || v.length < 4){ err.textContent = 'At least 4 digits'; return; }
      if(mode === 'setup'){
        const v2 = $('lock-input-2').value.trim();
        if(v !== v2){ err.textContent = 'Codes don\'t match'; return; }
        localStorage.setItem('ss_pass_hash', await sha256(v));
        sessionStorage.setItem('ss_unlocked', '1');
        location.reload();
      } else {
        if((await sha256(v)) === LOCK.storedHash()){
          localStorage.setItem('ss_fails', '0');
          sessionStorage.setItem('ss_unlocked', '1');
          location.reload();
        } else {
          const fails = LOCK.failures() + 1;
          localStorage.setItem('ss_fails', String(fails));
          if(fails >= 5){
            localStorage.setItem('ss_locked_until', String(Date.now() + 15*60*1000));
            err.textContent = 'Too many tries. Locked 15 min.';
            setTimeout(() => location.reload(), 1500);
          } else { err.textContent = `Wrong. ${5-fails} left.`; $('lock-input').value=''; }
        }
      }
    };
    $('lock-go').onclick = go;
    $('lock-input').onkeydown = (e) => { if(e.key === 'Enter'){
      if(mode === 'setup' && $('lock-input-2')) $('lock-input-2').focus(); else go();
    }};
    if($('lock-input-2')) $('lock-input-2').onkeydown = (e) => { if(e.key === 'Enter') go(); };
  }

  if(!LOCK.storedHash()){ lockScreen('setup'); throw new Error('LOCK'); }
  if(!LOCK.sessionOK()){ lockScreen('unlock'); throw new Error('LOCK'); }

  // ===== Toast =====
  function toast(msg){
    state.toast = msg;
    render();
    setTimeout(() => { state.toast = null; render(); }, 3200);
  }

  // ===== Source chunking (for citation grounding) =====
  // Each source is split into ~800-char chunks. Each chunk gets an id.
  function chunkText(text, chunkSize = 1000){
    const chunks = [];
    // Split by paragraphs first
    const paragraphs = text.split(/\n\s*\n/);
    let current = '';
    for(const p of paragraphs){
      if((current + '\n\n' + p).length > chunkSize && current.length > 200){
        chunks.push(current.trim());
        current = p;
      } else {
        current = current ? current + '\n\n' + p : p;
      }
    }
    if(current.trim()) chunks.push(current.trim());
    // If still no chunks (text was one giant paragraph), hard-split
    if(chunks.length === 0){
      for(let i = 0; i < text.length; i += chunkSize){
        chunks.push(text.substring(i, i + chunkSize));
      }
    }
    return chunks;
  }

  // ===== PDF =====
  async function extractPDF(file){
    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({data: buf}).promise;
    let text = '';
    for(let i = 1; i <= pdf.numPages; i++){
      const page = await pdf.getPage(i);
      const tc = await page.getTextContent();
      text += tc.items.map(it => it.str).join(' ') + '\n\n';
    }
    return { text, pageCount: pdf.numPages };
  }

  // ===== Web fetch via proxy =====
  async function fetchURL(url){
    // Try jina.ai reader first (clean markdown)
    try {
      const r = await fetch('https://r.jina.ai/' + url, { headers: { 'Accept': 'text/plain' } });
      if(r.ok){
        const text = await r.text();
        if(text.length > 100) return text;
      }
    } catch(e){ /* fallthrough */ }
    // Fallback: corsproxy.io + strip HTML
    try {
      const r = await fetch('https://corsproxy.io/?' + encodeURIComponent(url));
      if(r.ok){
        const html = await r.text();
        const div = document.createElement('div');
        div.innerHTML = html;
        // remove scripts, styles, nav
        div.querySelectorAll('script,style,nav,header,footer,aside').forEach(el => el.remove());
        const text = div.textContent.replace(/\s+/g, ' ').trim();
        if(text.length > 100) return text;
      }
    } catch(e){ /* fallthrough */ }
    throw new Error('Could not fetch the URL. The site may block automated access.');
  }

  // ===== Gemini API =====
  async function callGemini(prompt, asJSON = true){
    if(!state.apiKey) throw new Error('Add your Gemini API key first (sidebar).');
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${state.apiKey}`;
    const body = {
      contents: [{ parts: [{ text: prompt }] }],
      generationConfig: {
        temperature: 0.4,
        maxOutputTokens: 8000,
        ...(asJSON ? { responseMimeType: 'application/json' } : {}),
      },
    };
    const res = await fetch(url, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body),
    });
    if(!res.ok){
      const err = await res.text();
      throw new Error(`API ${res.status}: ${err.substring(0, 180)}`);
    }
    const data = await res.json();
    const text = data?.candidates?.[0]?.content?.parts?.[0]?.text || '';
    if(asJSON){
      try { return JSON.parse(text); }
      catch(e){
        const m = text.match(/\{[\s\S]*\}|\[[\s\S]*\]/);
        if(m) return JSON.parse(m[0]);
        throw new Error('AI response was not valid JSON.');
      }
    }
    return text;
  }

  // ===== Build grounded context for a notebook (with citation tags) =====
  function buildGroundedContext(notebook, selectedSourceIds = null, maxChars = 80000){
    const sources = notebook.sources.filter(s => !selectedSourceIds || selectedSourceIds.has(s.id));
    let totalChunks = 0;
    sources.forEach(s => totalChunks += s.chunks.length);
    // budget per chunk
    const budget = Math.max(maxChars, 40000);
    const targetCharsPerChunk = Math.floor(budget / Math.max(totalChunks, 1));
    let out = '';
    sources.forEach((src, sIdx) => {
      const sNum = notebook.sources.indexOf(src) + 1; // global source number
      out += `\n\n=== SOURCE ${sNum}: ${src.name} ===\n`;
      src.chunks.forEach((chunk, cIdx) => {
        const trimmed = chunk.length > targetCharsPerChunk
          ? chunk.substring(0, targetCharsPerChunk) + '...'
          : chunk;
        out += `\n[S${sNum}:${cIdx+1}] ${trimmed}\n`;
      });
    });
    // hard truncate if still too long
    if(out.length > maxChars){
      // sample
      const numChunks = 10;
      const step = Math.floor(out.length / numChunks);
      const chunkSize = Math.floor(maxChars / numChunks);
      let truncated = '';
      for(let i = 0; i < numChunks; i++){
        truncated += out.substring(i * step, i * step + chunkSize) + '\n[...]\n';
      }
      return truncated;
    }
    return out;
  }

  // ===== Chat =====
  async function askQuestion(notebook, question){
    const sources = notebook.sources.filter(s => !state.selectedSources || state.selectedSources.has(s.id));
    if(sources.length === 0) throw new Error('Select at least one source.');

    const context = buildGroundedContext(notebook, state.selectedSources);
    const history = state.chatHistory[notebook.id] || [];
    const recentHistory = history.slice(-6).map(m => `${m.role === 'user' ? 'USER' : 'ASSISTANT'}: ${m.content}`).join('\n\n');

    const prompt = `You are an expert tutor answering questions STRICTLY based on the provided study sources. Never use outside knowledge — only what's in the sources.

CITATION RULES (critical):
- Every factual claim MUST be followed by inline citations like [S1:3] meaning "Source 1, chunk 3"
- Citations go IMMEDIATELY after the claim they support (before periods)
- Multiple citations: [S1:2][S2:5]
- If the sources don't contain the answer, say: "The sources don't cover this." — do not guess.
- Be precise, exam-ready, well-structured. Use **bold** for key terms. Use bullet points for lists.

CONVERSATION SO FAR:
${recentHistory || '(start of conversation)'}

SOURCES:
${context}

USER QUESTION: ${question}

Answer with inline [S#:#] citations. Be thorough but to-the-point.`;

    return await callGemini(prompt, false);
  }

  async function suggestQuestions(notebook){
    const context = buildGroundedContext(notebook, null, 40000);
    const prompt = `Based on these study sources, generate 4 insightful questions a student might ask to prepare for exams. Mix conceptual ("explain"), comparison, and application questions.

SOURCES:
${context}

Return JSON: {"questions": ["q1","q2","q3","q4"]}`;
    const r = await callGemini(prompt, true);
    return r.questions || [];
  }

  // ===== Study aids =====
  async function generateSummary(notebook){
    const context = buildGroundedContext(notebook, state.selectedSources);
    const prompt = `Create a concise briefing document of the key information from these sources. Use citations like [S1:2].

STRUCTURE:
## Overview (2-3 sentences)
## Key Themes (3-5 bullet points with citations)
## Important Concepts (5-8 bullet points with citations, briefly explained)
## Critical Takeaways (3-4 bullet points with citations)

SOURCES:
${context}

Return the briefing in markdown format. Be exam-focused. Cite every factual claim with [S#:#].`;
    return await callGemini(prompt, false);
  }

  async function generateStudyGuide(notebook){
    const context = buildGroundedContext(notebook, state.selectedSources);
    const prompt = `Create a comprehensive study guide from these sources. Cite everything with [S#:#].

STRUCTURE (use markdown):
## 📌 Core Topics (organized list of all major topics)
## 🔑 Key Terms & Definitions (term → definition format, 10-20 terms)
## 🧠 Important Concepts (with brief explanations and citations)
## 📊 Relationships & Comparisons (how concepts connect)
## ✏️ Things to Memorize (formulas, dates, names, etc. if present)
## 🎯 Likely Exam Focus Areas (based on emphasis in sources)

SOURCES:
${context}

Be precise, structured, exam-oriented. Use **bold** for terms. Cite every fact.`;
    return await callGemini(prompt, false);
  }

  async function generateFAQ(notebook){
    const context = buildGroundedContext(notebook, state.selectedSources);
    const prompt = `Generate 10-12 likely exam questions a teacher might ask from these sources, with detailed model answers. Cite sources with [S#:#].

Mix question types: definitions, explanations, comparisons, applications, analysis.

Return strict JSON:
{
  "faqs": [
    { "question": "...", "answer": "Detailed answer with [S#:#] citations" }
  ]
}

SOURCES:
${context}`;
    const r = await callGemini(prompt, true);
    return r.faqs || [];
  }

  // ===== Quiz/Flashcards/Mindmap =====
  async function generateQuiz(notebook, cfg){
    const context = buildGroundedContext(notebook, state.selectedSources, 60000);
    const typeStr = cfg.types.join(', ');
    const focusStr = cfg.focus ? `\nFOCUS / CUSTOMIZATION: ${cfg.focus}` : '';
    const prompt = `Generate ${cfg.count} ${cfg.difficulty}-difficulty quiz questions from these study sources.

REQUIREMENTS:
- Types: ${typeStr} ('mcq', 'tf' for true/false, 'short' for short answer)
- Cover the FULL breadth of sources — don't over-concentrate
- Each question tests a DIFFERENT concept
- Plausible distractors (common misconceptions)
- Explanations: 2-3 sentences, teach the concept${focusStr}

JSON FORMAT:
{
  "questions": [
    { "type": "mcq", "question": "...", "options": ["A","B","C","D"], "correctIndex": 0, "explanation": "...", "topic": "..." }
  ]
}
For 'tf': options ["True","False"], correctIndex 0|1.
For 'short': options array with one item (model answer), correctIndex 0.

SOURCES:
${context}

Return ONLY JSON.`;
    const r = await callGemini(prompt, true);
    return r.questions || [];
  }

  async function generateFlashcards(notebook){
    const context = buildGroundedContext(notebook, state.selectedSources, 50000);
    const prompt = `Create 15 high-quality study flashcards from these sources.
- Front: clear prompt/term (1 line)
- Back: precise answer (1-3 sentences)
- Vary: definitions, comparisons, "explain", "list", "why"

JSON: { "cards": [{ "front": "...", "back": "...", "topic": "..." }] }

SOURCES:
${context}

Return ONLY JSON.`;
    const r = await callGemini(prompt, true);
    return r.cards || [];
  }

  async function generateMindmap(notebook){
    const context = buildGroundedContext(notebook, state.selectedSources, 50000);
    const prompt = `Create a mindmap of the core concepts in these sources.

JSON:
{
  "central": "Core topic (3-6 words)",
  "branches": [{ "title": "...", "points": ["...", "..."] }]
}
- 4-7 branches
- Each: 3-6 concise bullet points (not full sentences)

SOURCES:
${context}

Return ONLY JSON.`;
    return await callGemini(prompt, true);
  }

  // ===== Sidebar =====
  function renderSidebar(){
    const items = [
      ['home','🏠','Home'],
      ['notebooks','📚','Notebooks'],
      ['results','📊','Results'],
    ];
    const hasKey = !!state.apiKey;
    return `
      <aside class="sidebar">
        <div class="logo"><span class="dot"></span><span>StudySpark</span></div>
        ${items.map(([k,i,l]) => `
          <button class="nav-item ${state.page===k?'active':''}" data-nav="${k}">
            <span class="nav-icon">${i}</span><span>${l}</span>
          </button>
        `).join('')}
        <div class="api-status ${hasKey?'ok':'no'}">
          <div class="label">Gemini API</div>
          <div class="value">${hasKey?'● Connected':'○ Not set'}</div>
          <button class="btn btn-ghost" style="margin-top:8px;padding:6px 10px;font-size:12px;color:#fff8ec;width:100%;justify-content:flex-start" data-action="open-key">
            ${hasKey?'Change key':'Add API key'}
          </button>
          <button class="btn btn-ghost" style="margin-top:4px;padding:6px 10px;font-size:12px;color:#fff8ec;width:100%;justify-content:flex-start" data-action="lock-now">
            🔒 Lock app
          </button>
        </div>
      </aside>`;
  }

  // ===== Home / Dashboard =====
  function renderHome(){
    const totalSources = state.notebooks.reduce((s,n)=>s+n.sources.length,0);
    const totalQuizzes = state.results.length;
    const totalCorrect = state.results.reduce((s,r)=>s+r.correct,0);
    const totalQs = state.results.reduce((s,r)=>s+r.total,0);
    const avg = totalQs ? Math.round(totalCorrect/totalQs*100) : 0;
    const recent = [...state.results].sort((a,b)=>b.date-a.date).slice(0,5);
    return `
      <div class="main">
        <h1 class="page-title">Hey, ready to crush it? 🚀</h1>
        <p class="page-sub">Your AI-powered study command center.</p>
        <div class="stat-grid">

  // Render a single chat message with citation parsing
  function renderMessage(msg, notebook){
    if(msg.role === 'user'){
      return `<div class="msg user">${escapeHTML(msg.content)}</div>`;
    }
    // assistant - parse markdown + citations
    let html = msg.content;
    // Escape HTML first (but preserve markdown formatting)
    html = html
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/\*([^*]+)\*/g, '<em>$1</em>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/^### (.+)$/gm, '<h3 style="font-family:Fraunces,serif;font-size:17px;font-weight:700;margin:10px 0 6px">$1</h3>')
      .replace(/^## (.+)$/gm, '<h2 style="font-family:Fraunces,serif;font-size:19px;font-weight:700;margin:12px 0 6px">$1</h2>')
      .replace(/^- (.+)$/gm, '• $1')
      .replace(/\n\n/g, '<br><br>')
      .replace(/\n/g, '<br>');
    // Replace citations [S1:3] with pills
    html = html.replace(/\[S(\d+):(\d+)\]/g, (m, s, c) => {
      return `<span class="citation-pill" data-action="show-cite" data-source="${s}" data-chunk="${c}">[${s}.${c}]</span>`;
    });
    return `<div class="msg assistant">${html}</div>`;
  }

  function escapeHTML(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function renderMarkdownWithCitations(text){
    if(!text) return '';
    let html = text
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/\*([^*]+)\*/g, '<em>$1</em>')
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^# (.+)$/gm, '<h2>$1</h2>');
    // Lists
    html = html.replace(/(?:^[-*] .+(?:\n|$))+/gm, (m) => {
      const items = m.trim().split(/\n/).map(l => l.replace(/^[-*] /, '')).map(t => `<li>${t}</li>`).join('');
      return `<ul>${items}</ul>`;
    });
    // numbered lists
    html = html.replace(/(?:^\d+\. .+(?:\n|$))+/gm, (m) => {
      const items = m.trim().split(/\n/).map(l => l.replace(/^\d+\. /, '')).map(t => `<li>${t}</li>`).join('');
      return `<ol>${items}</ol>`;
    });
    // paragraphs
    html = html.split(/\n\n+/).map(p => {
      if(p.match(/^<(h[123]|ul|ol)/)) return p;
      return p.trim() ? `<p>${p.replace(/\n/g,'<br>')}</p>` : '';
    }).join('');
    // citations
    html = html.replace(/\[S(\d+):(\d+)\]/g, (m, s, c) =>
      `<span class="citation-pill" data-action="show-cite" data-source="${s}" data-chunk="${c}">[${s}.${c}]</span>`);
    return html;
  }

              <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:2px dashed rgba(26,21,48,.1);gap:12px;flex-wrap:wrap">
                <div style="flex:1;min-width:0">
                  <div style="font-weight:700;font-size:17px">${r.notebook}</div>
                  <div style="font-size:13px;color:rgba(26,21,48,.6);margin-top:4px">${r.difficulty} difficulty · ${new Date(r.date).toLocaleString()}</div>
                </div>
                <div style="text-align:right">
                  <div style="font-family:'Fraunces',serif;font-size:32px;font-weight:800;line-height:1;color:${r.correct/r.total>=0.7?'#0a4d2c':r.correct/r.total>=0.5?'#b8860b':'#a3104a'}">${Math.round(r.correct/r.total*100)}%</div>
                  <div style="font-size:12px;color:rgba(26,21,48,.6);font-weight:600">${r.correct}/${r.total}</div>

  function renderLoader(text, sub){
    return `<div class="main"><div class="card loader">
      <div class="loader-spinner"></div>
      <div class="loader-text">${text}</div>
      <div class="loader-sub">${sub||''}</div>
    </div></div>`;
  }

  function renderModal(){
    if(!state.modal) return '';
    const m = state.modal;
    if(m.type === 'apikey'){
      return `
        <div class="modal-backdrop" data-action="close-modal">
          <div class="modal" onclick="event.stopPropagation()">
            <h2>🔑 Gemini API Key</h2>
            <p>Get a free key at <strong>aistudio.google.com</strong>. Free tier: 1,500 requests/day. Stays in your browser only.</p>
            <input type="password" class="input" id="api-key-input" placeholder="Paste your key..." value="${state.apiKey}">
            <div class="actions">
              <button class="btn btn-ghost" data-action="close-modal">Cancel</button>
              <button class="btn btn-pink" data-action="save-key">Save</button>
            </div>
          </div>
        </div>`;
    }
    if(m.type === 'new-nb'){
      return `
        <div class="modal-backdrop" data-action="close-modal">
          <div class="modal" onclick="event.stopPropagation()">
            <h2>📓 New notebook</h2>
            <p>Give it a name. You can add sources after.</p>
            <input class="input" id="nb-title" placeholder="e.g. ACCA Financial Reporting" autofocus>
            <div style="margin-top:14px">
              <label style="display:block;font-weight:600;font-size:14px;margin-bottom:8px">Pick an emoji</label>
              <div style="display:flex;flex-wrap:wrap;gap:6px">
                ${NOTEBOOK_EMOJIS.map(e => `<button class="chip" data-emoji="${e}" style="font-size:20px;padding:6px 10px">${e}</button>`).join('')}
              </div>

            <div class="actions">
              <button class="btn btn-ghost" data-action="close-modal">Cancel</button>
              <button class="btn btn-pink" data-action="create-nb">Create</button>
            </div>
          </div>
        </div>`;
    }
    if(m.type === 'add-text'){
      return `
        <div class="modal-backdrop" data-action="close-modal">
          <div class="modal" onclick="event.stopPropagation()">
            <h2>📝 Paste text</h2>
            <p>Lecture notes, article excerpt, your own summary — any text.</p>
            <div class="field">
              <label>Source name</label>
              <input class="input" id="txt-name" placeholder="e.g. Lecture 3 notes">
            </div>
            <div class="field">
              <label>Content</label>
              <textarea class="textarea" id="txt-body" placeholder="Paste here..." style="min-height:240px"></textarea>
            </div>
            <div class="actions">
              <button class="btn btn-ghost" data-action="close-modal">Cancel</button>
              <button class="btn btn-pink" data-action="save-text">Add source</button>
            </div>
          </div>
        </div>`;

    if(m.type === 'add-link'){
      return `
        <div class="modal-backdrop" data-action="close-modal">

            <p style="font-size:13px;color:rgba(26,21,48,.55);font-weight:500;margin-bottom:0">Uses r.jina.ai reader service. Some sites may block automated access.</p>
            <div class="actions">
              <button class="btn btn-ghost" data-action="close-modal">Cancel</button>
              <button class="btn btn-pink" data-action="save-link">Fetch & add</button>
            </div>
          </div>
        </div>`;
    }
    if(m.type === 'rename-nb'){
      const nb = state.activeNotebook;
      return `
        <div class="modal-backdrop" data-action="close-modal">
          <div class="modal" onclick="event.stopPropagation()">
            <h2>✏️ Rename notebook</h2>
            <input class="input" id="rn-title" value="${nb.title}" autofocus>

              <label style="display:block;font-weight:600;font-size:14px;margin-bottom:8px">Emoji</label>
              <div style="display:flex;flex-wrap:wrap;gap:6px">
                ${NOTEBOOK_EMOJIS.map(e => `<button class="chip ${nb.emoji===e?'active':''}" data-emoji="${e}" style="font-size:20px;padding:6px 10px">${e}</button>`).join('')}
              </div>
            </div>
            <div class="actions">
              <button class="btn btn-ghost" data-action="close-modal">Cancel</button>
              <button class="btn btn-pink" data-action="save-rename">Save</button>

  // ===== Main render =====
  function render(){
    let body;
    if(state.loading) body = renderLoader(state.loading.text, state.loading.sub);
    else if(state.currentQuiz && state.quizState && !state.quizState.finished) body = renderQuizPlayer();
    else if(state.quizState && state.quizState.finished) body = renderQuizResults();
    else if(state.currentFlashcards) body = renderFlashcards();
    else if(state.currentMindmap) body = renderMindmap();
    else if(state.page === 'quiz-setup') body = renderQuizSetup();
    else if(state.page === 'notebook' && state.activeNotebook) body = renderNotebook();
    else if(state.page === 'notebooks') body = renderNotebookList();
    else if(state.page === 'results') body = renderResultsPage();
    else body = renderHome();

    root.innerHTML = renderSidebar() + body + renderModal() + renderStudioView() + renderCitePopup() +
      (state.toast ? `<div class="toast">${state.toast}</div>` : '');
    attachHandlers();
  }

  // ===== Handlers =====
  function attachHandlers(){
    document.querySelectorAll('[data-nav]').forEach(el => {
      el.onclick = (e) => {
        e.stopPropagation();
        state.page = el.dataset.nav;
        state.activeNotebook = null;
        state.currentQuiz = null; state.quizState = null;
        state.currentFlashcards = null; state.flashState = null;
        state.currentMindmap = null; state.studioView = null;
        render();
      };
    });
    document.querySelectorAll('[data-action]').forEach(el => {
      el.onclick = (e) => {
        e.stopPropagation();
        handleAction(el.dataset.action, el.dataset, el, e);
      };
    });
    // emoji pick (modals)
    document.querySelectorAll('[data-emoji]').forEach(el => {
      el.onclick = (e) => {
        e.stopPropagation();
        document.querySelectorAll('[data-emoji]').forEach(x => x.classList.remove('active'));
        el.classList.add('active');
        if(state.modal) state.modal.emoji = el.dataset.emoji;
      };
    });
    // config chips
    document.querySelectorAll('[data-cfg]').forEach(el => {
      el.onclick = () => {
        const v = el.dataset.val;
        state.quizConfig[el.dataset.cfg] = isNaN(v) ? v : parseInt(v);
        render();
      };
    });
    document.querySelectorAll('[data-toggle="type"]').forEach(el => {
      el.onclick = () => {
        const v = el.dataset.val;
        const t = state.quizConfig.types;
        if(t.includes(v)){ if(t.length > 1) state.quizConfig.types = t.filter(x => x !== v); }
        else state.quizConfig.types = [...t, v];
        render();
      };
    });
    // quiz focus textarea
    const qf = $('qs-focus');
    if(qf) qf.oninput = (e) => { state.quizConfig.focus = e.target.value; };
    const qg = $('qs-go');
    if(qg) qg.onclick = () => startQuizGen();
    const shortEl = $('short-ans');
    if(shortEl) shortEl.oninput = (e) => { state.quizState.answers[state.quizState.idx] = e.target.value; };

    // Chat input
    const chatInput = $('chatInput');
    if(chatInput){
      chatInput.onkeydown = (e) => {
        if((e.metaKey || e.ctrlKey) && e.key === 'Enter'){
          e.preventDefault();
          sendMessage();
        }
      };
      // auto-resize
      chatInput.oninput = (e) => {
        e.target.style.height = 'auto';
        e.target.style.height = Math.min(120, e.target.scrollHeight) + 'px';
      };
    }
    // auto-scroll chat to bottom
    const cm = $('chatMsgs');
    if(cm) cm.scrollTop = cm.scrollHeight;
  }

  function handleAction(action, data, el, evt){
    switch(action){
      case 'open-key':
        state.modal = { type: 'apikey' }; render(); break;
      case 'close-modal':
        state.modal = null; render(); break;
      case 'save-key': {
        const v = $('api-key-input').value.trim();
        state.apiKey = v;
        localStorage.setItem('ss_api_key', v);
        state.modal = null;
        toast(v ? '✓ API key saved' : 'Key cleared');
        render();
        break;
      }
      case 'lock-now':
        sessionStorage.removeItem('ss_unlocked');
        location.reload();
        break;
      case 'new-notebook':
        state.modal = { type: 'new-nb', emoji: NOTEBOOK_EMOJIS[Math.floor(Math.random()*NOTEBOOK_EMOJIS.length)] };
        render(); break;
      case 'create-nb': {
        const t = $('nb-title').value.trim();
        if(!t){ toast('Give it a name'); return; }
        const nb = {
          id: 'nb_' + Date.now(),
          title: t,
          emoji: state.modal.emoji || '📘',
          sources: [],
          created: Date.now(),
          studio: {},
          suggestedQs: [],
        };
        state.notebooks.unshift(nb);
        save();
        state.modal = null;
        state.activeNotebook = nb;
        state.page = 'notebook';
        toast('✨ Notebook created');
        render();
        break;
      }
      case 'open-nb': {
        const nb = state.notebooks.find(n => n.id === data.id);
        if(!nb) return;
        state.activeNotebook = nb;
        state.selectedSources = null;
        state.page = 'notebook';
        render();
        break;
      }
      case 'back-to-nb':
        state.currentQuiz = null; state.quizState = null;
        state.currentFlashcards = null; state.flashState = null;
        state.currentMindmap = null;
        state.page = 'notebook';
        render();
        break;
      case 'rename-nb':
        state.modal = { type: 'rename-nb', emoji: state.activeNotebook.emoji };
        render();
        break;
      case 'save-rename': {
        const t = $('rn-title').value.trim();
        if(!t) return;
        state.activeNotebook.title = t;
        state.activeNotebook.emoji = state.modal.emoji || state.activeNotebook.emoji;
        save();
        state.modal = null;
        toast('✓ Saved');
        render();
        break;
      }
      case 'delete-nb':
        if(confirm(`Delete "${state.activeNotebook.title}" and all its data?`)){
          state.notebooks = state.notebooks.filter(n => n.id !== state.activeNotebook.id);
          delete state.chatHistory[state.activeNotebook.id];
          save();
          state.activeNotebook = null;
          state.page = 'notebooks';
          toast('🗑️ Deleted');
          render();
        }
        break;
      case 'add-pdf': {
        const inp = document.createElement('input');
        inp.type = 'file';
        inp.accept = 'application/pdf';
        inp.onchange = (e) => { if(e.target.files[0]) addPDFSource(e.target.files[0]); };
        inp.click();
        break;
      }
      case 'add-text':
        state.modal = { type: 'add-text' }; render(); break;
      case 'add-link':
        state.modal = { type: 'add-link' }; render(); break;
      case 'save-text': {
        const name = $('txt-name').value.trim() || 'Pasted text';
        const body = $('txt-body').value.trim();
        if(!body || body.length < 50){ toast('Need at least 50 chars'); return; }
        addSource({ type: 'text', name, text: body });
        state.modal = null;
        render();
        break;
      }
      case 'save-link': {
        const url = $('link-url').value.trim();
        if(!url || !url.startsWith('http')){ toast('Enter a valid URL'); return; }
        state.modal = null;
        addLinkSource(url);
        break;
      }
      case 'toggle-src': {
        const id = data.id;
        if(!state.selectedSources) state.selectedSources = new Set(state.activeNotebook.sources.map(s => s.id));
        if(state.selectedSources.has(id)) state.selectedSources.delete(id);
        else state.selectedSources.add(id);
        if(state.selectedSources.size === state.activeNotebook.sources.length) state.selectedSources = null;
        render();
        break;
      }
      case 'del-src':
        if(confirm('Remove this source?')){
          state.activeNotebook.sources = state.activeNotebook.sources.filter(s => s.id !== data.id);
          if(state.selectedSources) state.selectedSources.delete(data.id);
          // Clear studio outputs that depended on it
          state.activeNotebook.studio = {};
          state.activeNotebook.suggestedQs = [];
          save();
          render();
        }
        break;
      case 'select-all-src':
        state.selectedSources = null;
        render();
        break;
      case 'select-none-src':
        state.selectedSources = new Set();
        render();
        break;
      case 'send-msg':
        sendMessage();
        break;
      case 'suggest-q':
        doSuggestQuestions();
        break;
      case 'ask-suggested': {
        const q = data.q;
        sendMessage(q);
        break;
      }
      case 'show-cite': {
        state.citePopup = {
          x: evt.clientX,
          y: evt.clientY,
          sourceNum: parseInt(data.source),
          chunkIdx: parseInt(data.chunk),
        };
        render();
        break;
      }
      case 'close-cite':
        state.citePopup = null; render(); break;
      case 'close-studio':
        state.studioView = null; render(); break;
      case 'studio-summary': doStudio('summary'); break;
      case 'studio-studyguide': doStudio('studyguide'); break;
      case 'studio-faq': doStudio('faq'); break;
      case 'regen-studio':
        doStudio(data.type, true);
        break;
      case 'studio-quiz':
        state.page = 'quiz-setup';
        render();
        break;
      case 'studio-flash': doFlashcards(); break;
      case 'studio-mind': doMindmap(); break;
      case 'answer':
        state.quizState.answers[state.quizState.idx] = parseInt(data.idx);
        render(); break;
      case 'quiz-check':
        state.quizState.showExp = true; render(); break;
      case 'quiz-next':
        state.quizState.idx++; state.quizState.showExp = false; render(); break;
      case 'quiz-prev':
        state.quizState.idx--; state.quizState.showExp = state.quizState.answers[state.quizState.idx]!==undefined;
        render(); break;
      case 'quiz-finish': {
        const q = state.currentQuiz;
        let correct = 0;
        q.questions.forEach((qq, i) => { if(qq.type !== 'short' && state.quizState.answers[i] === qq.correctIndex) correct++; });
        const gradable = q.questions.filter(qq => qq.type !== 'short').length;
        state.results.push({
          notebookId: state.activeNotebook.id,
          notebook: state.activeNotebook.title,
          difficulty: q.difficulty,
          correct, total: gradable, date: Date.now(),
        });
        save();
        state.quizState.finished = true;
        render(); break;
      }
      case 'quiz-exit':
        if(confirm('Exit quiz? Progress lost.')){
          state.currentQuiz = null; state.quizState = null; state.page = 'notebook'; render();
        }
        break;
      case 'quiz-review':
        state.quizState.idx = 0; state.quizState.showExp = true; state.quizState.finished = false;
        render(); break;
      case 'quiz-retry':
        state.currentQuiz = null; state.quizState = null; state.page = 'quiz-setup';
        render(); break;
      case 'flip':
        state.flashState.flipped = !state.flashState.flipped; render(); break;
      case 'flash-next':
        state.flashState.idx++; state.flashState.flipped = false; render(); break;
      case 'flash-prev':
        state.flashState.idx--; state.flashState.flipped = false; render(); break;
      case 'flash-exit':
        state.currentFlashcards = null; state.flashState = null; render(); break;
      case 'mind-exit':
        state.currentMindmap = null; render(); break;
    }
  }

  // ===== Source-adding helpers =====
  function addSource(srcData){
    const text = srcData.text;
    const chunks = chunkText(text, 1000);
    const source = {
      id: 'src_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
      type: srcData.type,
      name: srcData.name,
      text,
      chunks,
      added: Date.now(),
    };
    state.activeNotebook.sources.push(source);
    // Reset studio (sources changed)
    state.activeNotebook.studio = {};
    state.activeNotebook.suggestedQs = [];
    save();
    toast(`✨ Added "${source.name}" (${chunks.length} chunks)`);
  }

  async function addPDFSource(file){
    state.loading = { text: 'Parsing PDF...', sub: file.name };
    render();
    try {
      const { text, pageCount } = await extractPDF(file);
      if(text.trim().length < 100){
        state.loading = null;
        toast('⚠️ No text found. Scanned PDF?');
        render(); return;
      }
      addSource({ type: 'pdf', name: file.name.replace(/\.pdf$/i,''), text });
      state.loading = null;
      render();
    } catch(e){
      state.loading = null;
      toast('❌ ' + e.message);
      render();
    }
  }

  async function addLinkSource(url){
    state.loading = { text: 'Fetching page...', sub: url };
    render();
    try {
      const text = await fetchURL(url);
      let name;
      try { name = new URL(url).hostname.replace(/^www\./,''); } catch(e){ name = url; }
      addSource({ type: 'link', name: name + ' — ' + url.substring(0,40), text });
      state.loading = null;
      render();
    } catch(e){
      state.loading = null;
      toast('❌ ' + e.message);
      render();
    }
  }

  // ===== Chat send =====
  async function sendMessage(forceText){
    const nb = state.activeNotebook;
    if(!nb) return;
    const input = $('chatInput');
    const text = (forceText || (input ? input.value.trim() : '')).trim();
    if(!text) return;
    if(!state.apiKey){ state.modal = { type: 'apikey' }; render(); return; }

    if(!state.chatHistory[nb.id]) state.chatHistory[nb.id] = [];
    state.chatHistory[nb.id].push({ role: 'user', content: text });
    if(input){ input.value = ''; input.style.height = 'auto'; }
    state.chatThinking = true;
    render();

    try {
      const answer = await askQuestion(nb, text);
      state.chatHistory[nb.id].push({ role: 'assistant', content: answer });
      state.chatThinking = false;
      render();
    } catch(e){
      state.chatHistory[nb.id].push({ role: 'assistant', content: '❌ ' + e.message });
      state.chatThinking = false;
      render();
    }
  }

  async function doSuggestQuestions(){
    const nb = state.activeNotebook;
    if(!state.apiKey){ state.modal = { type: 'apikey' }; render(); return; }
    state.loading = { text: 'Generating questions...', sub: '' };
    render();
    try {
      const qs = await suggestQuestions(nb);
      nb.suggestedQs = qs;
      save();
      state.loading = null;
      render();
    } catch(e){
      state.loading = null;
      toast('❌ ' + e.message);
      render();
    }
  }

  async function doStudio(type, regen = false){
    const nb = state.activeNotebook;
    if(!state.apiKey){ state.modal = { type: 'apikey' }; render(); return; }
    nb.studio = nb.studio || {};
    if(nb.studio[type] && !regen){
      state.studioView = { type, content: nb.studio[type], notebookId: nb.id };
      render();
      return;
    }
    const labels = {
      summary: 'Generating briefing document...',
      studyguide: 'Building study guide...',
      faq: 'Crafting exam questions...',
    };
    state.loading = { text: labels[type], sub: 'Reading & synthesizing your sources' };
    render();
    try {
      let content;
      if(type === 'summary') content = await generateSummary(nb);
      else if(type === 'studyguide') content = await generateStudyGuide(nb);
      else if(type === 'faq') content = await generateFAQ(nb);
      nb.studio[type] = content;
      save();
      state.loading = null;
      state.studioView = { type, content, notebookId: nb.id };
      render();
    } catch(e){
      state.loading = null;
      toast('❌ ' + e.message);
      render();
    }
  }

  async function startQuizGen(){
    const nb = state.activeNotebook;
    if(!state.apiKey){ state.modal = { type: 'apikey' }; render(); return; }
    state.loading = { text: 'Crafting quiz...', sub: `${state.quizConfig.count} ${state.quizConfig.difficulty} questions` };
    render();
    try {
      const questions = await generateQuiz(nb, state.quizConfig);
      if(!questions || questions.length === 0) throw new Error('No questions generated');
      state.currentQuiz = { notebookId: nb.id, difficulty: state.quizConfig.difficulty, questions };
      state.quizState = { idx: 0, answers: {}, showExp: false };
      state.loading = null;
      render();
    } catch(e){
      state.loading = null;
      toast('❌ ' + e.message);
      render();
    }
  }

  async function doFlashcards(){
    const nb = state.activeNotebook;
    if(!state.apiKey){ state.modal = { type: 'apikey' }; render(); return; }
    state.loading = { text: 'Building flashcards...', sub: '' };
    render();
    try {
      const cards = await generateFlashcards(nb);
      if(!cards || cards.length === 0) throw new Error('No cards generated');
      state.currentFlashcards = { notebookId: nb.id, cards };
      state.flashState = { idx: 0, flipped: false };
      state.loading = null;
      render();
    } catch(e){
      state.loading = null;
      toast('❌ ' + e.message);
      render();
    }
  }

  async function doMindmap(){
    const nb = state.activeNotebook;
    if(!state.apiKey){ state.modal = { type: 'apikey' }; render(); return; }
    state.loading = { text: 'Mapping concepts...', sub: '' };
    render();
    try {
      const mm = await generateMindmap(nb);
      state.currentMindmap = mm;
      state.loading = null;
      render();
    } catch(e){
      state.loading = null;
      toast('❌ ' + e.message);
      render();
    }
  }

  // Boot
  render();
</script>
</body>
</html>
